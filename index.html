"glyphosate": {
  name:"Glyphosate", aka:["Roundup","N-(phosphonomethyl)glycine","Glyphosate-isopropylamine salt"],
  cas:"1071-83-6",
  chemClass:{name:"Organophosphorus herbicides (phosphonoglycine)",def:"A broad-spectrum, non-selective systemic herbicide. Unlike organophosphate insecticides, glyphosate targets the shikimate pathway in plants (not acetylcholinesterase). It is the most widely used herbicide in the world, with use exploding after the introduction of Roundup Ready GMO crops."},
  desc:"The world's most widely used herbicide. Over 250 million pounds applied annually in the US alone. Use skyrocketed with the introduction of glyphosate-tolerant (Roundup Ready) GMO crops. IARC classified it as a probable human carcinogen in 2015, triggering thousands of lawsuits. Bayer (which acquired Monsanto) has paid over $10 billion in settlements to plaintiffs alleging glyphosate caused their non-Hodgkin lymphoma.",
  formula:"C₃H₈NO₅P", molWeight:"169.07",
  structure:{atoms:[{el:"HO",x:.14,y:.42},{el:"P",x:.30,y:.42},{el:"CH₂",x:.47,y:.42},{el:"NH",x:.61,y:.42},{el:"CH₂",x:.75,y:.42},{el:"COOH",x:.89,y:.42}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1},{a:4,b:5,o:1}],label:"Phosphonomethylglycine"},
  toxicity:[
    {label:"Cancer",val:"Probably carcinogenic to humans (IARC Group 2A, 2015). Associated with non-Hodgkin lymphoma. Bayer has paid >$10 billion in cancer settlements. EPA's own assessment disputed IARC, creating ongoing scientific controversy."},
    {label:"Endocrine disruption",val:"Disrupts aromatase and estrogen receptor signaling. Alters testosterone and estrogen levels in animal studies. Effects on reproductive hormone pathways at environmentally relevant concentrations."},
    {label:"Microbiome",val:"Targets the shikimate pathway, which exists in gut bacteria. May disrupt the human gut microbiome, with downstream effects on immune function and metabolism. Active area of research."},
    {label:"Ecological",val:"Detectable in most US waterways. Toxic to aquatic organisms in formulated products (surfactants increase toxicity). Harms soil microbial communities. Drives herbicide-resistant weed evolution requiring ever more chemical inputs."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 based on IARC's probable carcinogen classification, endocrine disruption evidence, and reproductive toxicity data. The scientific debate between IARC and EPA assessments remains politically charged, but the weight of independent evidence supports the IARC classification."},
  parents:["Glycine","Formaldehyde","Phosphorous acid"],
  children:["AMPA (primary degradation product)"],
  products:["Roundup and generic herbicides","Agricultural crops (pre-harvest desiccant)","Lawn & garden weed killers","Municipal weed control","Railroad vegetation management","GMO crop systems (Roundup Ready)"],
  func:"Non-selective systemic herbicide that inhibits the EPSP synthase enzyme in the shikimate pathway, blocking amino acid synthesis in plants. Kills virtually all green plants except those genetically modified to resist it.",
  manufacturers:[{name:"Bayer (formerly Monsanto)",note:"Invented glyphosate (Roundup). Acquired Monsanto in 2018 for $63B. Paid $10.9B+ in cancer settlements."},{name:"Corteva Agriscience (Dow/DuPont)",note:"Produces glyphosate formulations."},{name:"BASF",note:"Major glyphosate producer."},{name:"Syngenta (ChemChina)",note:"Produces glyphosate formulations globally."},{name:"Nufarm",note:"Australian company, major generic glyphosate producer."},{name:"Various Chinese manufacturers",note:"China produces ~80% of global glyphosate. Dozens of manufacturers including Zhejiang Xinan, Hubei Sanonda."}],
  saferAlternatives:[
    {context:"Weed control",alt:"Mechanical cultivation, mulching, cover crops, flame weeding, organic herbicides (vinegar-based, citric acid)",note:"Organic farming demonstrates large-scale alternatives. Many municipalities have banned glyphosate in public spaces."},
    {context:"Lawn care",alt:"Corn gluten meal (pre-emergent), manual removal, overseeding, organic lawn care programs",note:"Multiple cities have adopted pesticide-free parks policies."},
    {context:"Agriculture",alt:"Integrated Weed Management, crop rotation, cover cropping, reduced tillage with targeted application",note:"Regenerative agriculture practices reduce herbicide dependency."}
  ],
  altSource:"Organic farming practices, municipal pesticide-free programs",
  links:[{t:"IARC monograph",u:"https://monographs.iarc.who.int/wp-content/uploads/2018/07/mono112.pdf"},{t:"EPA glyphosate",u:"https://www.epa.gov/ingredients-used-pesticide-products/glyphosate"},{t:"Beyond Pesticides",u:"https://www.beyondpesticides.org/programs/organic/why-organic/glyphosate"}],
  legislation:[{st:"US",bill:"EPA registration",status:"passed",title:"EPA reregistered glyphosate — finding 'not likely to be carcinogenic' (disputed by IARC)"},{st:"EU",bill:"Reg 2023/2660",status:"passed",title:"EU renewed glyphosate approval for 10 years (2023, highly contested)"},{st:"MX",bill:"Presidential decree",status:"passed",title:"Mexico banned glyphosate in food production (phased)"},{st:"CA",bill:"Prop 65",status:"passed",title:"Glyphosate listed as known carcinogen under Prop 65"}]
},
"chlorpyrifos": {
  name:"Chlorpyrifos", aka:["Dursban","Lorsban","CPF","O,O-diethyl O-3,5,6-trichloropyridinyl phosphorothioate"],
  cas:"2921-88-2",
  chemClass:{name:"Organophosphate insecticides",def:"Synthetic pesticides that inhibit acetylcholinesterase, the enzyme that breaks down the neurotransmitter acetylcholine. This is the same mechanism as nerve agents. Organophosphates are among the most acutely toxic pesticides. Chlorpyrifos is one of the most widely used members."},
  desc:"One of the most widely used organophosphate insecticides in the US for decades. Scientific evidence that it harms children's brain development accumulated for 20+ years before EPA finally revoked food tolerances in 2021. Farmworker communities — predominantly Latino — bore the greatest exposure burden. The chlorpyrifos saga is a case study in regulatory delay and environmental injustice.",
  formula:"C₉H₁₁Cl₃NO₃PS", molWeight:"350.59",
  structure:{atoms:[{el:"Cl",x:.14,y:.22},{el:"◯N",x:.33,y:.42},{el:"O",x:.53,y:.42},{el:"P",x:.67,y:.42},{el:"S",x:.67,y:.20},{el:"OEt",x:.83,y:.35},{el:"OEt",x:.83,y:.55}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:2},{a:3,b:5,o:1},{a:3,b:6,o:1}],label:"Organophosphate with trichloropyridine ring"},
  toxicity:[
    {label:"Neurodevelopmental",val:"Columbia University studies found prenatal exposure causes reduced IQ (avg. 2-5 points), structural brain changes (reduced cortical surface area), and increased ADHD and autism risk in children. Effects at doses below those causing acetylcholinesterase inhibition."},
    {label:"Acute neurotoxicity",val:"Inhibits acetylcholinesterase — same mechanism as nerve agents. Acute poisoning causes salivation, tremors, seizures, and death. Hundreds of farmworker poisonings annually."},
    {label:"Environmental justice",val:"Agricultural workers — disproportionately Latino immigrant communities — face highest exposures through drift, residues on crops, and contaminated housing near treated fields."},
    {label:"Ecological",val:"Highly toxic to birds, fish, and aquatic invertebrates. Kills bees and other beneficial insects. Persistent in soil (half-life 11-140 days depending on conditions). Contaminates surface water through agricultural runoff."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to neurodevelopmental toxicity, acute neurotoxicity, and environmental persistence. EPA revoked food tolerances in 2021 after decades of advocacy. Some agricultural uses continue under contested legal status."},
  parents:["3,5,6-Trichloro-2-pyridinol","Diethyl thiophosphoryl chloride"],
  children:["Chlorpyrifos-oxon (active metabolite)","TCP (degradation product)"],
  products:["Agricultural insecticide (field crops, orchards)","Golf course treatment","Commercial pest control","Termite treatment (restricted)","Indoor use banned since 2000"],
  func:"Broad-spectrum organophosphate insecticide. Kills insects by irreversibly inhibiting acetylcholinesterase, causing nervous system failure.",
  manufacturers:[{name:"Corteva Agriscience (formerly Dow AgroSciences)",note:"Invented and primary producer of chlorpyrifos (brand: Lorsban/Dursban). Aggressively fought EPA regulation for decades."},{name:"Gharda Chemicals",note:"Indian manufacturer, major global chlorpyrifos supplier."},{name:"Various generic producers",note:"Off-patent since 2000s. Multiple manufacturers in China and India."}],
  saferAlternatives:[
    {context:"Agriculture",alt:"IPM, biological controls (Bt, parasitic wasps), pheromone traps, neem-based products",note:"EPA revoked all food tolerances (2022). Organic agriculture has long operated without chlorpyrifos."},
    {context:"Structural pest control",alt:"Bait systems, boric acid, diatomaceous earth, physical exclusion",note:"Chlorpyrifos was banned for residential use in 2001. Baits and physical methods are effective alternatives."}
  ],
  altSource:"EPA food tolerance revocation, organic agriculture practices",
  links:[{t:"EPA chlorpyrifos",u:"https://www.epa.gov/ingredients-used-pesticide-products/chlorpyrifos"},{t:"Columbia Center for Children's Env Health",u:"https://www.publichealth.columbia.edu/research/columbia-center-childrens-environmental-health"},{t:"Earthjustice",u:"https://earthjustice.org/feature/chlorpyrifos-toxic-pesticide"}],
  legislation:[{st:"US",bill:"EPA revocation",status:"passed",title:"EPA revoked all food tolerances for chlorpyrifos (2021, later challenged in court)"},{st:"CA",bill:"DPR",status:"passed",title:"California banned chlorpyrifos for agricultural use"},{st:"HI",bill:"SB 3095",status:"passed",title:"Hawaii banned chlorpyrifos statewide"},{st:"EU",bill:"Reg 2020/17",status:"passed",title:"EU non-renewal of chlorpyrifos approval (2020)"}]
},
"atrazine": {
  name:"Atrazine", aka:["2-Chloro-4-ethylamino-6-isopropylamino-s-triazine","Aatrex","Gesaprim"],
  cas:"1912-24-9",
  chemClass:{name:"Triazine herbicides",def:"Synthetic herbicides based on a 1,3,5-triazine ring structure. Used primarily for broadleaf weed control in corn and sorghum. Atrazine is the most widely used triazine and the second most used herbicide in the US. Banned in the EU since 2004 due to groundwater contamination."},
  desc:"The second most used herbicide in the US (~70 million pounds/year), primarily on corn. Banned in the EU since 2004 due to persistent groundwater contamination. Tyrone Hayes's research showing atrazine feminizes frogs at 0.1 ppb — 30x below EPA's safe drinking water level — became one of the most consequential and controversial findings in environmental health. Syngenta's campaign to discredit Hayes is well documented.",
  formula:"C₈H₁₄ClN₅", molWeight:"215.68",
  structure:{atoms:[{el:"N",x:.33,y:.25},{el:"C",x:.50,y:.17},{el:"N",x:.67,y:.25},{el:"C",x:.67,y:.47},{el:"N",x:.50,y:.55},{el:"C",x:.33,y:.47},{el:"Cl",x:.50,y:.03}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1},{a:4,b:5,o:1},{a:5,b:0,o:1},{a:1,b:6,o:1}],ring:true,label:"Triazine ring with chloro, ethylamino, isopropylamino groups"},
  toxicity:[
    {label:"Endocrine disruption",val:"Feminizes male frogs at 0.1 ppb — turns genetic males into functional females. Disrupts aromatase enzyme, increasing estrogen conversion. Effects across vertebrate species including mammals."},
    {label:"Reproductive",val:"Associated with menstrual irregularities, preterm birth, and low birth weight in human epidemiological studies. Reduces testosterone and sperm quality in animals."},
    {label:"Cancer",val:"Epidemiological studies link atrazine exposure to ovarian cancer, non-Hodgkin lymphoma, and thyroid cancer. IARC Group 2A is debated — EPA says 'not likely,' but independent science disagrees."},
    {label:"Ecological",val:"Most commonly detected pesticide in US groundwater and surface water. Persists in soil for months. Contaminates drinking water for millions, especially in the Corn Belt. Toxic to amphibians at parts-per-trillion."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to potent endocrine disruption at ultra-low doses, reproductive toxicity, and widespread water contamination. Banned in EU since 2004. The gap between US and EU regulatory positions is stark."},
  parents:["Cyanuric chloride","Ethylamine","Isopropylamine"],
  children:["DEA (desethylatrazine, degradation product)","DIA (desisopropylatrazine)"],
  products:["Corn herbicide","Sorghum herbicide","Sugarcane herbicide","Lawn care (some states)","Christmas tree farms","Highway right-of-way"],
  func:"Selective herbicide that inhibits photosynthesis in broadleaf weeds (blocks photosystem II). Applied pre- and post-emergence to corn and other crops.",
  manufacturers:[{name:"Syngenta",note:"Primary producer and defender of atrazine. Funded campaign to discredit Tyrone Hayes's research. Swiss-based, now owned by ChemChina."},{name:"Various generic producers",note:"Off-patent. Multiple manufacturers in China, India, and Israel."}],
  links:[{t:"EPA atrazine",u:"https://www.epa.gov/ingredients-used-pesticide-products/atrazine"},{t:"NRDC atrazine",u:"https://www.nrdc.org/stories/atrazine-poisoning-well"},{t:"Tyrone Hayes research",u:"https://vcresearch.berkeley.edu/faculty/tyrone-hayes"}],
  legislation:[{st:"EU",bill:"Reg 2004/248",status:"passed",title:"EU banned atrazine due to groundwater contamination (2004)"},{st:"US",bill:"EPA MCL",status:"passed",title:"EPA MCL for atrazine in drinking water: 3 ppb"},{st:"US",bill:"EPA reregistration",status:"passed",title:"EPA reregistered atrazine with mitigation measures (contested)"},{st:"MN",bill:"MDA",status:"passed",title:"Minnesota monitoring and restriction program for atrazine in vulnerable areas"}]
},
"diisocyanates": {
  name:"Diisocyanates (MDI & TDI)", aka:["MDI","TDI","Methylene diphenyl diisocyanate","Toluene diisocyanate","Isocyanates","Polyurethane precursors"],
  cas:"101-68-8 (MDI), 26471-62-5 (TDI)",
  chemClass:{name:"Isocyanates",def:"Organic compounds containing the highly reactive -N=C=O (isocyanate) functional group. Diisocyanates have two such groups and are used to make polyurethane foams, coatings, and adhesives. They are among the leading causes of occupational asthma worldwide."},
  desc:"The reactive chemicals used to make all polyurethane products — from mattress foam to spray insulation to automotive coatings. MDI and TDI are the two dominant diisocyanates. They are potent respiratory sensitizers and the leading cause of occupational asthma worldwide. Spray polyurethane foam (SPF) insulation is a growing consumer exposure source.",
  formula:"C₁₅H₁₀N₂O₂ (MDI) / C₉H₆N₂O₂ (TDI)", molWeight:"250.25 / 174.16",
  structure:{atoms:[{el:"OCN",x:.14,y:.42},{el:"◯",x:.30,y:.42},{el:"CH₂",x:.47,y:.42},{el:"◯",x:.64,y:.42},{el:"NCO",x:.80,y:.42}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1}],label:"MDI — two phenyl rings bridged by CH₂, each with isocyanate group"},
  toxicity:[
    {label:"Respiratory sensitization",val:"Leading cause of occupational asthma worldwide. Once sensitized, even trace exposures trigger severe bronchospasm. Sensitization is irreversible. Spray foam insulation is a growing exposure source for construction workers and building occupants."},
    {label:"Acute toxicity",val:"Highly irritating to eyes, skin, and respiratory tract. Acute overexposure can cause chemical pneumonitis, pulmonary edema, and death."},
    {label:"Cancer (TDI)",val:"TDI is a possible human carcinogen (IARC Group 2B). Causes nasal and lung tumors in animals. MDI data are more limited but carcinogenicity is plausible."},
    {label:"Ecological",val:"Highly reactive with water — breaks down relatively quickly but reaction products (polyureas, amines) persist. Off-gassing from spray foam insulation is a chronic indoor air quality concern."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to potent respiratory sensitization, acute toxicity, and carcinogenicity (TDI). Fully reacted polyurethane is generally considered lower hazard, but unreacted isocyanate residues in spray foam and fresh coatings pose serious exposure risks."},
  parents:["Aniline","Formaldehyde (for MDI)","Toluene (for TDI)","Phosgene"],
  children:["Polyurethane foam","Polyurethane coatings","Polyurethane adhesives","Spandex fiber"],
  products:["Spray foam insulation","Mattress & furniture foam","Automotive coatings","Adhesives & sealants","Shoe soles","Spandex/elastane fiber","Skateboard wheels"],
  func:"React with polyols to form polyurethane polymers. The isocyanate groups crosslink to create rigid or flexible foams, coatings, and elastomers. Extremely versatile chemistry but hazardous in unreacted form.",
  manufacturers:[{name:"Covestro (formerly Bayer MaterialScience)",note:"World's largest producer of MDI and TDI."},{name:"BASF",note:"Major MDI producer. Operates largest MDI plant in the world (Geismar, LA)."},{name:"Dow Chemical",note:"Major MDI and polyurethane systems producer."},{name:"Huntsman Corporation",note:"Major MDI and TDI producer. The Woodlands, TX headquarters."},{name:"Wanhua Chemical",note:"Chinese company, now world's largest MDI producer by volume."}],

},
"pfoa": {
  name:"PFOA", aka:["Perfluorooctanoic acid","C8","APFO (ammonium salt)"],
  cas:"335-67-1",
  chemClass:{name:"Long-chain perfluoroalkyl carboxylic acids",def:"PFOA is a specific PFAS compound — an 8-carbon perfluorinated carboxylic acid. Once used as a processing aid to make Teflon and other fluoropolymers. One of the most studied and restricted individual PFAS compounds."},
  desc:"The PFAS compound that launched a thousand lawsuits. Used by DuPont for decades to manufacture Teflon at its Washington Works plant in Parkersburg, WV, contaminating drinking water for over 70,000 people. Rob Bilott's legal battle against DuPont (portrayed in 'Dark Waters') exposed corporate concealment of PFOA's toxicity. IARC upgraded PFOA to a Group 1 known carcinogen in 2023.",
  formula:"C₈HF₁₅O₂", molWeight:"414.07",
  structure:{atoms:[{el:"F₃C",x:.11,y:.42},{el:"CF₂",x:.28,y:.42},{el:"CF₂",x:.44,y:.42},{el:"CF₂",x:.61,y:.42},{el:"COOH",x:.83,y:.42}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1}],label:"8-carbon perfluorinated chain with carboxylic acid"},
  toxicity:[
    {label:"Cancer",val:"Known human carcinogen (IARC Group 1, upgraded 2023). Causes kidney and testicular cancer. Also associated with breast, liver, pancreatic, and thyroid cancer."},
    {label:"Immune",val:"Suppresses vaccine antibody response in children. One of the most sensitive endpoints — effects at very low serum levels. Weakens immune defense against infections."},
    {label:"Reproductive",val:"Associated with preeclampsia, reduced birth weight, and altered fetal growth. Crosses the placenta. Detected in cord blood and breast milk worldwide."},
    {label:"Ecological",val:"Environmental half-life: essentially infinite. Detected in blood of people and wildlife globally. Contaminates drinking water for millions. Bio-accumulates through food chains."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — known carcinogen, immunotoxicant, reproductive toxicant, and one of the most persistent chemicals ever created. The 'forever chemical' archetype. DuPont/Chemours have paid billions in settlements and cleanup costs."},
  parents:["PFAS (parent class)","Electrochemical fluorination"],
  children:["Teflon (PTFE, made using PFOA as processing aid)","Fluoropolymer coatings"],
  products:["Teflon manufacturing (phased out as processing aid)","Stain-resistant carpets (legacy)","AFFF firefighting foam (legacy)","Food packaging (legacy)","Waterproof clothing (legacy)","Contaminated drinking water near manufacturing sites"],
  func:"Formerly used as a surfactant/processing aid in fluoropolymer production (Teflon). Phased out of production in the US by 2015 under EPA Stewardship Program, but legacy contamination is ubiquitous and permanent.",
  manufacturers:[{name:"DuPont / Chemours",note:"Used PFOA as processing aid for Teflon at Washington Works, Parkersburg, WV for decades. Subject of 'Dark Waters' lawsuit."},{name:"3M",note:"Supplied PFOA to DuPont. Produced PFOA-based products until phase-out."},{name:"Daikin",note:"Continued PFOA use longer than US producers."},{name:"Solvay",note:"PFOA contamination at West Deptford, NJ facility."}],
  triSearch:"https://edap.epa.gov/public/extensions/TRIToxicsTracker/TRIToxicsTracker.html",
  links:[{t:"EPA PFOA",u:"https://www.epa.gov/pfas/basic-information-pfas"},{t:"IARC 2023 assessment",u:"https://www.iarc.who.int/news-events/iarc-monographs-evaluate-the-carcinogenicity-of-pfoa-and-pfos/"},{t:"Dark Waters info",u:"https://theintercept.com/collections/the-teflon-toxin/"}],
  legislation:[{st:"US",bill:"EPA MCL",status:"passed",title:"EPA final MCL for PFOA in drinking water: 4 ppt (2024)"},{st:"US",bill:"EPA CERCLA",status:"passed",title:"PFOA designated as hazardous substance under Superfund"},{st:"Global",bill:"Stockholm Convention",status:"passed",title:"PFOA listed as POP for global elimination (2019)"},{st:"US",bill:"EPA Stewardship",status:"passed",title:"8 manufacturers phased out PFOA production by 2015"}]
},
"pfos": {
  name:"PFOS", aka:["Perfluorooctane sulfonic acid","Perfluorooctanesulfonate","Sulfluramid precursor"],
  cas:"1763-23-1",
  chemClass:{name:"Long-chain perfluoroalkyl sulfonic acids",def:"PFOS is a specific PFAS compound — an 8-carbon perfluorinated sulfonic acid. The key ingredient in 3M's Scotchgard and in AFFF firefighting foam. More bioaccumulative than PFOA."},
  desc:"The other headline PFAS compound alongside PFOA. Produced by 3M for decades as the active ingredient in Scotchgard fabric protector and as a key component of aqueous film-forming foam (AFFF) used to fight fuel fires. 3M phased out PFOS production in 2002 after internal studies showed global wildlife contamination. 3M has agreed to pay over $10 billion to settle water contamination claims.",
  formula:"C₈HF₁₇O₃S", molWeight:"500.13",
  structure:{atoms:[{el:"F₃C",x:.11,y:.42},{el:"CF₂",x:.28,y:.42},{el:"CF₂",x:.44,y:.42},{el:"CF₂",x:.61,y:.42},{el:"SO₃H",x:.83,y:.42}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1}],label:"8-carbon perfluorinated chain with sulfonic acid"},
  toxicity:[
    {label:"Cancer",val:"Possibly carcinogenic to humans (IARC Group 2B, 2023). Associated with liver, bladder, and breast cancer. Less conclusive than PFOA but growing evidence."},
    {label:"Immune",val:"Suppresses immune response. Reduces vaccine effectiveness in children. Among the most immunotoxic PFAS compounds studied."},
    {label:"Liver",val:"Causes liver enlargement, steatosis (fatty liver), and liver damage. One of the most liver-toxic PFAS compounds."},
    {label:"Ecological",val:"More bioaccumulative than PFOA. Found in wildlife globally — from polar bears to dolphins. Biomagnifies dramatically through aquatic food chains. 3M's own studies found PFOS in wildlife on every continent."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — extremely persistent, highly bioaccumulative, and toxic. The most bioaccumulative PFAS widely studied. Listed as a POP under the Stockholm Convention. 3M phased out production in 2002 but contamination is permanent."},
  parents:["PFAS (parent class)","Electrochemical fluorination"],
  children:["AFFF firefighting foam","Scotchgard (legacy formulation)"],
  products:["AFFF firefighting foam (primary source)","Scotchgard fabric protector (legacy)","Stain-resistant carpets (legacy)","Chrome plating mist suppressant","Contaminated groundwater near military bases and airports"],
  func:"Surfactant in AFFF foam — creates an aqueous film that smothers hydrocarbon fuel fires. Also used as a fabric and carpet protector (oil/water repellent). Phased out of production by 3M in 2002.",
  manufacturers:[{name:"3M",note:"Primary global producer of PFOS via electrochemical fluorination. Phased out production 2002. $10.3B water contamination settlement (2023)."},{name:"Various AFFF foam manufacturers",note:"Tyco/Chemguard, National Foam, Kidde, Buckeye — used PFOS in AFFF firefighting foam."}],
  triSearch:"https://edap.epa.gov/public/extensions/TRIToxicsTracker/TRIToxicsTracker.html",
  links:[{t:"EPA PFOS",u:"https://www.epa.gov/pfas/basic-information-pfas"},{t:"IARC assessment",u:"https://www.iarc.who.int/news-events/iarc-monographs-evaluate-the-carcinogenicity-of-pfoa-and-pfos/"},{t:"3M settlement",u:"https://www.3m.com/3M/en_US/pfas-stewardship-us/"}],
  legislation:[{st:"US",bill:"EPA MCL",status:"passed",title:"EPA final MCL for PFOS in drinking water: 4 ppt (2024)"},{st:"US",bill:"EPA CERCLA",status:"passed",title:"PFOS designated as hazardous substance under Superfund"},{st:"Global",bill:"Stockholm Convention",status:"passed",title:"PFOS listed as POP for global elimination/restriction (2009)"},{st:"WA",bill:"PBT Rule",status:"passed",title:"PFOS and salts listed on Washington PBT list"},{st:"WA",bill:"RCW 70A.400",status:"passed",title:"Washington banned PFOS-containing AFFF firefighting foam"}],
  waPBT:true
},
"dehp": {
  name:"DEHP", aka:["Di(2-ethylhexyl) phthalate","Bis(2-ethylhexyl) phthalate","BEHP","DOP"],
  cas:"117-81-7",
  chemClass:{name:"Ortho-phthalate esters",def:"DEHP is the single most widely used phthalate plasticizer. An ortho-phthalate ester of 2-ethylhexanol. The flagship member of the phthalate class — when people say 'phthalates are harmful,' DEHP is usually the primary evidence base."},
  desc:"The most widely used phthalate plasticizer globally. Added to PVC to make it flexible — without DEHP, PVC is rigid. DEHP is not chemically bound to PVC, so it continuously leaches out, exposing everyone who touches, breathes near, or eats from flexible PVC products. A potent anti-androgen that disrupts male reproductive development. Banned in children's toys in the US and EU but still ubiquitous in medical devices, flooring, and food packaging.",
  formula:"C₂₄H₃₈O₄", molWeight:"390.56",
  structure:{atoms:[{el:"◯",x:.36,y:.42},{el:"COO",x:.58,y:.28},{el:"COO",x:.58,y:.56},{el:"R",x:.78,y:.28},{el:"R",x:.78,y:.56}],bonds:[{a:0,b:1,o:1},{a:0,b:2,o:1},{a:1,b:3,o:1},{a:2,b:4,o:1}],label:"Phthalate diester — R = 2-ethylhexyl chains"},
  toxicity:[
    {label:"Reproductive (male)",val:"Potent anti-androgen. Disrupts fetal testosterone synthesis, causing 'phthalate syndrome': reduced anogenital distance, undescended testes, and hypospadias in infant boys. Effects documented at background human exposure levels."},
    {label:"Endocrine disruption",val:"Disrupts multiple hormone pathways. Reduces testosterone, alters thyroid hormones, and affects insulin signaling. Classified as a reproductive toxicant (Cat 1B) and endocrine disruptor in the EU."},
    {label:"Metabolic",val:"Associated with obesity, insulin resistance, and type 2 diabetes in epidemiological studies. Alters lipid metabolism and adipogenesis."},
    {label:"Ecological",val:"Ubiquitous environmental contaminant. Leaches from PVC in landfills into groundwater. Found in indoor dust, air, food, and water. One of the most frequently detected environmental contaminants globally."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to reproductive toxicity, endocrine disruption, and developmental toxicity. On EU REACH Authorization List (Annex XIV) — cannot be used without specific authorization. Safer plasticizer alternatives (DINCH, ATBC, citrate esters) are available."},
  parents:["Phthalic anhydride","2-Ethylhexanol"],
  children:[],
  products:["Flexible PVC products","Vinyl flooring","Medical tubing & IV bags","Food packaging","Shower curtains","Wire & cable insulation","Car interiors","Inflatable toys","Garden hoses"],
  func:"Plasticizer — makes rigid PVC flexible by inserting between polymer chains. Added at 20-40% by weight in flexible PVC. Not chemically bound, so it migrates out continuously over the product's lifetime.",
  manufacturers:[{name:"ExxonMobil Chemical",note:"Largest US DEHP producer (Jayflex DHP)."},{name:"BASF",note:"Produces Palatinol DHP."},{name:"Eastman Chemical",note:"Major plasticizer producer."},{name:"Nan Ya Plastics (Formosa Plastics Group)",note:"Major Asian DEHP producer."}],
  triSearch:"https://edap.epa.gov/public/extensions/TRIToxicsTracker/TRIToxicsTracker.html",
  saferAlternatives:[
    {context:"PVC plasticizer",alt:"DOTP (dioctyl terephthalate), ATBC (acetyl tributyl citrate), DINCH, bio-based plasticizers",note:"DOTP and citrate esters are drop-in replacements with lower toxicity profiles. WA Ecology Cycle 1 identified these as meeting criteria for safer."},
    {context:"Medical devices",alt:"Citrate plasticizers, TOTM, polyolefin-based materials, silicone",note:"FDA allows DEHP in medical devices but alternatives are available. B. Braun and Baxter offer DEHP-free IV bags."},
    {context:"Avoid entirely",alt:"Non-PVC materials",note:"Switching from PVC to polyethylene, polypropylene, or silicone eliminates the need for any plasticizer."}
  ],
  altSource:"WA Ecology Cycle 1 Regulatory Determinations, EPA",
  links:[{t:"EPA DEHP",u:"https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/phthalates"},{t:"ECHA SVHC",u:"https://echa.europa.eu/substance-information/-/substanceinfo/100.003.829"},{t:"CPSC phthalates",u:"https://www.cpsc.gov/Business--Manufacturing/Business-Education/Business-Guidance/Phthalates-Information"}],
  legislation:[{st:"US",bill:"CPSIA Sec. 108",status:"passed",title:"DEHP permanently banned in children's toys and child care articles at >0.1%"},{st:"EU",bill:"REACH Annex XIV",status:"passed",title:"DEHP on Authorization List — requires authorization for any use"},{st:"EU",bill:"REACH Annex XVII",status:"passed",title:"DEHP restricted in toys and childcare articles"},{st:"CA",bill:"Prop 65",status:"passed",title:"DEHP listed as reproductive toxicant and carcinogen"},{st:"WA",bill:"SPWA Cycle 1",status:"passed",title:"Ortho-phthalates (including DEHP) restricted in vinyl flooring and personal care fragrances"}],
  spwa:"Cycle 1 (as ortho-phthalates)"
},
"paraquat": {
  name:"Paraquat", aka:["Paraquat dichloride","Gramoxone","Methyl viologen"],
  cas:"4685-14-7",
  chemClass:{name:"Bipyridylium herbicides",def:"Contact herbicides that kill plant tissue on contact by generating superoxide radicals that destroy cell membranes. Paraquat is the most widely used member. Extremely toxic to humans with no antidote — a single mouthful can be fatal."},
  desc:"One of the most acutely lethal pesticides in the world. A single sip can cause irreversible lung fibrosis and death over days to weeks. Case fatality exceeds 70%. Banned in over 60 countries including the EU, but still used in the US and many low/middle-income countries. WHO identifies it as a leading cause of pesticide-related death globally, particularly from intentional ingestion. The lack of an effective antidote makes prevention the only strategy.",
  formula:"C₁₂H₁₄Cl₂N₂", molWeight:"257.16",
  structure:{atoms:[{el:"N⁺",x:.30,y:.42},{el:"—",x:.47,y:.42},{el:"N⁺",x:.64,y:.42}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1}],label:"Two linked pyridinium rings (bipyridyl)"},
  toxicity:[
    {label:"Acute lethality",val:"Among the most acutely lethal pesticides. A single mouthful (10-15 mL of concentrate) is usually fatal. Death occurs from progressive pulmonary fibrosis 1-4 weeks after ingestion. Case fatality >70%. No effective antidote exists."},
    {label:"Lung destruction",val:"Selectively concentrated in lung tissue via polyamine uptake. Generates reactive oxygen species that destroy alveolar epithelium, causing irreversible pulmonary fibrosis. Supplemental oxygen paradoxically worsens lung damage."},
    {label:"Neurological",val:"Epidemiological studies link occupational paraquat exposure to increased risk of Parkinson's disease. Mechanism involves selective toxicity to dopaminergic neurons similar to the neurotoxin MPTP."},
    {label:"Ecological",val:"Rapidly inactivated by soil binding but toxic to aquatic organisms before adsorption. Harms soil organisms and non-target plants. Drift damages adjacent crops and ecosystems."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to extreme acute lethality with no antidote, link to Parkinson's disease, and global burden of poisoning deaths. Banned in 60+ countries. WHO identifies it as a leading cause of pesticide suicide deaths."},
  parents:["4,4'-Bipyridine"],
  children:[],
  products:["Agricultural herbicide (non-selective)","Desiccant (pre-harvest crop drying)","Plantation weed control (palm oil, rubber, banana)"],
  func:"Fast-acting non-selective contact herbicide. Kills all green plant tissue on contact. Used for weed control and pre-harvest desiccation. Inactivated by soil contact, allowing no-till farming.",
  manufacturers:[{name:"Syngenta",note:"Primary global paraquat producer (Gramoxone brand). Swiss-based, owned by ChemChina."},{name:"Nufarm",note:"Australian company. Major paraquat formulator and distributor."},{name:"Various Chinese manufacturers",note:"China is a major paraquat production hub. Multiple generic producers."}],
  links:[{t:"WHO pesticide poisoning",u:"https://www.ncbi.nlm.nih.gov/books/NBK185105/"},{t:"EPA paraquat",u:"https://www.epa.gov/ingredients-used-pesticide-products/paraquat-dichloride"},{t:"PAN paraquat",u:"https://pan-international.org/paraquat/"}],
  legislation:[{st:"EU",bill:"Directive 2003/112",status:"passed",title:"EU banned paraquat (2007, upheld by Court of Justice)"},{st:"US",bill:"EPA RMD",status:"passed",title:"EPA restricted use — certified applicator only, no homeowner use"},{st:"CN",bill:"MARA",status:"passed",title:"China banned paraquat for domestic use (2016)"},{st:"BR",bill:"ANVISA",status:"passed",title:"Brazil banned paraquat (2020)"}]
},
"aluminium phosphide": {
  name:"Aluminium phosphide", aka:["Aluminum phosphide","AlP","Celphos","Phostoxin","Quickphos","Rice tablet"],
  cas:"20859-73-8",
  chemClass:{name:"Metal phosphide fumigants",def:"Inorganic compounds that release phosphine gas (PH₃) on contact with moisture or stomach acid. Used as grain fumigants in storage. Aluminium phosphide and zinc phosphide are the most common. Among the most lethal pesticides — phosphine gas inhibits cytochrome c oxidase, shutting down cellular respiration."},
  desc:"A grain fumigant that releases deadly phosphine gas on contact with moisture. Responsible for thousands of deaths annually, particularly in India where it is widely available as 'rice tablets' or 'wheat pills.' Case fatality exceeds 70%. Phosphine gas inhibits cellular respiration — essentially the same mechanism as cyanide. A major cause of pesticide suicide in South Asia. The WHO document identifies it as a significant poisoning problem.",
  formula:"AlP", molWeight:"57.96",
  structure:{atoms:[{el:"Al",x:.36,y:.42},{el:"P",x:.58,y:.42}],bonds:[{a:0,b:1,o:1}],label:"Releases PH₃ (phosphine) gas on contact with moisture"},
  toxicity:[
    {label:"Acute lethality",val:"Case fatality >70%. A single 3g tablet can be lethal. Phosphine gas inhibits cytochrome c oxidase (like cyanide), shutting down cellular respiration. Multi-organ failure within hours."},
    {label:"Cardiac",val:"Profound myocardial depression is the primary cause of death. Causes refractory cardiogenic shock, arrhythmias, and acute heart failure."},
    {label:"Metabolic",val:"Causes severe metabolic acidosis, hepatic failure, and renal failure. No specific antidote — treatment is entirely supportive."},
    {label:"Ecological",val:"Phosphine gas is extremely toxic to all aerobic organisms. Non-target kills of stored-grain insects, rodents, and birds at fumigation sites. Residues in grain are minimal after proper aeration."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to extreme acute lethality, no antidote, and massive global poisoning burden. Thousands of deaths annually, predominantly in India and South Asia. Safer fumigant alternatives and sealed storage methods exist."},
  parents:["Aluminium","Phosphorus"],
  children:["Phosphine gas (PH₃, the toxic agent)"],
  products:["Grain fumigant tablets","Rodent control","Mole/gopher control","Stored product protection"],
  func:"Fumigant that releases phosphine gas to kill insects and rodents in stored grain. Tablets are placed in grain stores; moisture triggers phosphine release. Effective but extremely dangerous.",
  manufacturers:[{name:"Syngenta",note:"Primary global paraquat producer (Gramoxone brand). Swiss-based, owned by ChemChina."},{name:"Nufarm",note:"Australian company. Major paraquat formulator and distributor."},{name:"Various Chinese manufacturers",note:"China is a major paraquat production hub. Multiple generic producers."}],
  links:[{t:"WHO pesticide poisoning",u:"https://www.ncbi.nlm.nih.gov/books/NBK185105/"},{t:"ATSDR phosphine",u:"https://www.atsdr.cdc.gov/toxprofiles/tp177.pdf"}],
  legislation:[{st:"US",bill:"EPA RUP",status:"passed",title:"Restricted Use Pesticide — certified applicator only"},{st:"IN",bill:"Regulation",status:"proposed",title:"Calls for stricter regulation of aluminium phosphide tablet sales in India"}]
},
"diazinon": {
  name:"Diazinon", aka:["Basudin","Spectracide","Dimpylate"],
  cas:"333-41-5",
  chemClass:{name:"Organophosphate insecticides",def:"Synthetic pesticides that inhibit acetylcholinesterase. Diazinon is a thiophosphate OP widely used until residential uses were banned. Still used in agriculture. Associated with increased cancer risk in the Agricultural Health Study."},
  desc:"An organophosphate insecticide once among the most commonly used home and garden pesticides in the US. EPA phased out residential uses in 2004 due to risks to children and aquatic organisms. Still used in agriculture. The WHO document identifies OP insecticides as causing an estimated 200,000 deaths annually worldwide, with diazinon among the commonly encountered compounds.",
  formula:"C₁₂H₂₁N₂O₃PS", molWeight:"304.35",
  structure:null,
  toxicity:[
    {label:"Neurotoxicity",val:"Inhibits acetylcholinesterase, causing cholinergic crisis — excessive salivation, lacrimation, urination, defecation, muscle fasciculations, and potentially death from respiratory failure."},
    {label:"Cancer",val:"IARC Group 2A (probably carcinogenic, 2017). Associated with lung cancer and non-Hodgkin lymphoma in the Agricultural Health Study."},
    {label:"Developmental",val:"Prenatal exposure associated with neurodevelopmental effects in children. Reduces birth weight and alters neurobehavioral development in animal studies."},
    {label:"Ecological",val:"Highly toxic to birds and aquatic organisms. Major water contaminant from agricultural runoff. Residential phase-out was driven partly by wildlife kills in urban waterways."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to IARC 2A carcinogenicity, acute neurotoxicity, and developmental effects. Residential uses phased out but agricultural uses continue."},
  parents:["Organophosphorus chemistry"],
  children:[],
  products:["Agricultural insecticide (fruit, vegetables, field crops)","Veterinary parasiticide","Residential pest control (banned since 2004)","Lawn treatment (banned)"],
  func:"Broad-spectrum organophosphate insecticide. Kills insects by irreversibly inhibiting acetylcholinesterase.",
  manufacturers:[{name:"Syngenta",note:"Primary diazinon producer (Basudin brand)."},{name:"Various generic producers",note:"Off-patent. Generic manufacturers in China and India."}],
  links:[{t:"EPA diazinon",u:"https://www.epa.gov/ingredients-used-pesticide-products/diazinon"},{t:"IARC monograph",u:"https://monographs.iarc.who.int/wp-content/uploads/2018/07/mono112.pdf"}],
  legislation:[{st:"US",bill:"EPA phase-out",status:"passed",title:"EPA phased out all residential uses of diazinon (2004)"},{st:"EU",bill:"Reg",status:"passed",title:"EU non-renewal of diazinon approval"}]
},
"parathion": {
  name:"Parathion & methyl parathion", aka:["Parathion","Methyl parathion","Folidol","Bladan","Penncap-M","E605"],
  cas:"56-38-2 (parathion), 298-00-0 (methyl parathion)",
  chemClass:{name:"Organophosphate insecticides (WHO Class Ia — Extremely hazardous)",def:"Among the most acutely toxic OP insecticides. WHO Class Ia classification. Parathion and methyl parathion are converted to their active 'oxon' forms in the body, which are far more potent acetylcholinesterase inhibitors than the parent compounds."},
  desc:"Among the most toxic pesticides ever widely used. WHO Class Ia (Extremely Hazardous). Responsible for massive numbers of poisoning deaths globally. Methyl parathion was illegally sprayed inside homes in Mississippi and Ohio in the 1990s, contaminating thousands of residences in predominantly low-income communities of color — one of the worst environmental justice pesticide incidents in US history. Both are now banned or severely restricted in most countries.",
  formula:"C₁₀H₁₄NO₅PS (parathion)", molWeight:"291.26",
  structure:null,
  toxicity:[
    {label:"Acute lethality",val:"Extremely toxic — oral LD50 as low as 2 mg/kg in rats. A few drops on skin can be lethal to humans. Rapid onset of cholinergic crisis leading to respiratory failure and death."},
    {label:"Environmental justice",val:"Methyl parathion was illegally applied inside 2,500+ homes in MS and OH (1990s) in low-income communities of color. Residents — including children — exposed for months before discovery. EPA Superfund cleanup."},
    {label:"Chronic effects",val:"Survivors of acute poisoning often experience persistent neurological effects — cognitive impairment, depression, and peripheral neuropathy lasting months to years."},

"24d": {

  chemClass:{name:"Chlorophenoxy acid herbicides",def:"Synthetic auxin herbicides that mimic plant growth hormones, causing uncontrolled growth and death in broadleaf plants. 2,4-D is the most widely used member. The WHO document references chlorophenoxy acetic acid derivatives as causes of significant poisoning. 2,4-D was a component of Agent Orange (mixed with 2,4,5-T)."},
  desc:"One of the oldest and most widely used herbicides in the world (since 1945). A component of Agent Orange (mixed 50:50 with 2,4,5-T, which was contaminated with dioxin). Still the third most used herbicide in the US (~25 million lbs/year). Use is increasing due to 2,4-D-tolerant GMO crops (Enlist Duo system) designed for fields where glyphosate-resistant weeds have emerged.",
  formula:"C₈H₆Cl₂O₃", molWeight:"221.04",
  structure:{atoms:[{el:"Cl",x:.11,y:.22},{el:"◯",x:.30,y:.42},{el:"O",x:.50,y:.42},{el:"CH₂",x:.64,y:.42},{el:"COOH",x:.83,y:.42},{el:"Cl",x:.11,y:.62}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1},{a:5,b:1,o:1}],label:"Dichlorophenoxyacetic acid"},
  toxicity:[
    {label:"Cancer",val:"IARC Group 2B (possibly carcinogenic, 2015). Associated with non-Hodgkin lymphoma and soft tissue sarcoma in some epidemiological studies. The Agent Orange association (via dioxin-contaminated 2,4,5-T) complicates the epidemiology."},
    {label:"Endocrine disruption",val:"Disrupts thyroid hormone pathways. Anti-estrogenic activity in some assays. Effects on reproductive hormone levels documented in exposed workers."},
    {label:"Acute toxicity",val:"Moderately toxic in acute poisoning. WHO document lists chlorphenoxy herbicides as causes of significant poisoning. Symptoms include vomiting, diarrhea, metabolic acidosis, and neuromuscular effects."},
    {label:"Ecological",val:"Toxic to aquatic organisms and non-target broadleaf plants. Prone to off-target drift. Increasing use with 2,4-D-tolerant GMOs raises concerns about drift damage and resistance evolution."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 based on IARC 2B classification, endocrine disruption, and association with NHL. Use is increasing with 2,4-D-tolerant GMO crop systems despite longstanding health concerns."},
  parents:["2,4-Dichlorophenol","Chloroacetic acid"],
  children:["Agent Orange (historical mixture with 2,4,5-T)","Enlist Duo (modern 2,4-D + glyphosate herbicide)"],
  products:["Lawn herbicides ('weed and feed')","Agricultural broadleaf weed control","Pasture and rangeland management","Right-of-way vegetation control","Enlist GMO crop system"],
  func:"Selective systemic herbicide that mimics the plant hormone auxin, causing uncontrolled growth in broadleaf weeds leading to death. Grass crops are tolerant. Now paired with GMO tolerance traits.",

"pyrethroids": {
  name:"Pyrethroid insecticides", aka:["Pyrethroids","Permethrin","Cypermethrin","Deltamethrin","Bifenthrin","Lambda-cyhalothrin"],
  cas:"Multiple (class)",
  chemClass:{name:"Pyrethroid insecticides",def:"Synthetic analogs of pyrethrins (natural insecticides from chrysanthemum flowers). Act on sodium channels in insect nervous systems. Generally less acutely toxic to mammals than organophosphates but highly toxic to aquatic invertebrates, fish, and bees. The most widely used class of insecticides globally."},
  desc:"The most widely used insecticide class globally, now dominant in both agriculture and residential pest control. Replaced organophosphates for most home uses. While less acutely toxic to humans than OPs, pyrethroids are endocrine disruptors and extremely toxic to aquatic ecosystems. Permethrin is found in treated clothing, bedding, and head lice treatments. The WHO document notes pyrethroids as 'less common causes of significant poisoning' but they can cause serious effects in large ingestions.",
  formula:"Various (synthetic chrysanthemum-derived)", molWeight:"Varies (350-500)",
  structure:null,
  toxicity:[
    {label:"Endocrine disruption",val:"Multiple pyrethroids are anti-androgenic and estrogenic. Permethrin, cypermethrin, and deltamethrin disrupt reproductive hormone signaling. Associated with altered pubertal timing in children."},
    {label:"Neurotoxicity",val:"Target voltage-gated sodium channels. Acute poisoning causes tremors, salivation, and seizures (Type I) or choreoathetosis and profuse salivation (Type II). Generally lower acute toxicity than OPs in humans."},
    {label:"Developmental",val:"Prenatal pyrethroid exposure associated with neurodevelopmental effects and behavioral changes in children. Detectable in urine of >70% of US population."},
    {label:"Ecological",val:"Extremely toxic to aquatic invertebrates and fish — orders of magnitude more toxic than to mammals. Major threat to aquatic ecosystems from agricultural and urban runoff. Highly toxic to bees."}
  ],
  gs:{bm:2,label:"Benchmark 2 — Use but search for safer alternatives",detail:"Individual pyrethroids range from BM-1 to BM-2. Bifenthrin is closer to BM-1 due to persistence and aquatic toxicity. Permethrin and deltamethrin are BM-2. The class is generally less hazardous than OPs to humans but devastating to aquatic ecosystems."},
  parents:["Natural pyrethrins (chrysanthemum)"],
  children:["Permethrin","Cypermethrin","Deltamethrin","Bifenthrin","Lambda-cyhalothrin"],
  products:["Home pest control sprays","Treated clothing & bedding (permethrin)","Head lice treatment","Agricultural insecticide","Mosquito control","Pet flea/tick treatment","Bed bug treatment"],
  func:"Neurotoxic insecticides that disrupt sodium channel function in insects, causing paralysis and death. Rapid knockdown effect. Broad-spectrum activity against most insects.",
  manufacturers:[{name:"FMC Corporation",note:"Major pyrethroid producer (bifenthrin — Talstar brand)."},{name:"BASF",note:"Produces several pyrethroid insecticides."},{name:"Bayer",note:"Major producer — deltamethrin, cyfluthrin."},{name:"Syngenta",note:"Produces lambda-cyhalothrin (Warrior brand)."},{name:"Sumitomo Chemical",note:"Produces permethrin and other pyrethroids."},{name:"SC Johnson",note:"Major consumer pyrethroid product company (Raid brand)."}],

},

  gs:{bm:1,label:"Benchmark 1 — Avoid (highly toxic members)",detail:"Carbofuran and aldicarb are BM-1 due to extreme acute toxicity and wildlife poisoning. Carbaryl is BM-2. EPA canceled all US carbofuran uses (2009) and most aldicarb uses. The class as a whole warrants caution."},

"neonicotinoids": {
  name:"Neonicotinoid insecticides", aka:["Neonics","Imidacloprid","Clothianidin","Thiamethoxam","Acetamiprid","Dinotefuran"],
  cas:"Multiple (class)",
  chemClass:{name:"Neonicotinoid insecticides",def:"Systemic insecticides that act on nicotinic acetylcholine receptors in insects. The most widely used insecticide class globally by volume. Implicated as a primary driver of pollinator decline worldwide. Applied as seed treatments, they permeate entire plants including pollen and nectar."},
  desc:"The most commercially successful insecticide class in history — and the most consequential for pollinators. Applied as seed coatings on most corn, soybean, and canola in the US, neonicotinoids permeate entire plants including pollen and nectar that bees collect. Scientific consensus now links neonics to pollinator decline, colony collapse disorder, and broader insect population crashes. EU banned outdoor use of three neonics in 2018; they remain widely used in the US.",
  formula:"Various (nitroguanidine or cyanamidine core)", molWeight:"Varies (220-293)",
  structure:null,
  toxicity:[
    {label:"Pollinator collapse",val:"Primary driver of bee colony losses and pollinator decline. Chronic sub-lethal exposure impairs navigation, foraging, reproduction, and immune function in bees. Seed treatment use means contamination of pollen and nectar at levels toxic to bees."},
    {label:"Neurotoxicity (human)",val:"Act on nicotinic acetylcholine receptors. Lower acute toxicity to mammals than OPs, but developmental neurotoxicity concerns emerging. Associated with congenital heart defects and neural tube defects in epidemiological studies."},
    {label:"Ecosystem collapse",val:"Linked to declines not just in bees but in total insect biomass, bird populations (insectivorous species), and aquatic invertebrates. Dutch studies linked imidacloprid water concentrations to bird population declines."},
    {label:"Water contamination",val:"Extremely water-soluble and persistent. Contaminate surface water and groundwater. Detected in the majority of US streams tested. Toxic to aquatic invertebrates at part-per-billion levels."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid (outdoor use)",detail:"BM-1 for outdoor use due to devastating pollinator and ecosystem impacts. The EU banned three neonics for outdoor use in 2018. EPA continues to allow widespread use in the US despite scientific consensus on pollinator harm."},
  parents:["Nicotine (natural analog)","Chloropyridine chemistry"],
  children:["Imidacloprid (Bayer)","Clothianidin (Bayer)","Thiamethoxam (Syngenta)","Acetamiprid","Dinotefuran"],

  func:"Systemic insecticides absorbed by plants through roots or leaves and translocated to all tissues, including pollen and nectar. Kill sap-feeding and chewing insects. Persist in soil for months to years.",
  manufacturers:[{name:"Bayer CropScience",note:"Invented and produces imidacloprid (Gaucho/Admire) and clothianidin (Poncho). Dominant neonicotinoid producer."},{name:"Syngenta/ChemChina",note:"Produces thiamethoxam (Actara/Cruiser). Second-largest neonic producer."},{name:"Corteva Agriscience",note:"Produces acetamiprid."},{name:"Mitsui Chemicals",note:"Japanese producer of acetamiprid."},{name:"Sumitomo Chemical",note:"Produces dinotefuran."}],
  saferAlternatives:[

"malathion": {

  chemClass:{name:"Organophosphate insecticides",def:"Synthetic pesticides that inhibit acetylcholinesterase. Malathion is one of the most widely used OPs, with both agricultural and public health applications including mosquito control. Less acutely toxic than parathion or chlorpyrifos but still an OP with cholinesterase-inhibiting activity."},

  structure:null,
  toxicity:[
    {label:"Cancer",val:"IARC Group 2A (probably carcinogenic to humans, 2015). Associated with non-Hodgkin lymphoma and prostate cancer in the Agricultural Health Study. Part of a dietary pesticide mixture linked to breast cancer."},
    {label:"Neurotoxicity",val:"Inhibits acetylcholinesterase. Less acutely toxic than many OPs due to rapid mammalian metabolism, but malaoxon (the active metabolite) is a potent cholinesterase inhibitor. Chronic low-level exposure linked to neurodevelopmental effects."},
    {label:"Dietary exposure",val:"Malathion diacid is one of 17 urinary pesticide biomarkers measured in NHANES. The EWG dietary pesticide study found it detected in 15.6% of participants, with levels associated with consumption of high-residue produce."},
    {label:"Ecological",val:"Highly toxic to aquatic invertebrates and bees. Used in aerial mosquito spraying programs, raising concerns about non-target insect kills. Contaminates surface water from agricultural runoff."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 based on IARC 2A carcinogenicity classification, neurotoxicity, and environmental harm. While less acutely toxic than other OPs, the probable carcinogenicity and widespread exposure through both diet and public health spraying warrant avoidance."},

  func:"Broad-spectrum organophosphate insecticide. Activated in insects to malaoxon, which inhibits acetylcholinesterase. Less toxic to mammals due to rapid detoxification by carboxylesterases, but the active metabolite malaoxon is highly potent.",

},
"chlormequat": {
  name:"Chlormequat", aka:["Chlormequat chloride","CCC","Cycocel","2-Chloroethyltrimethylammonium chloride"],
  cas:"999-81-5",
  chemClass:{name:"Plant growth regulators (quaternary ammonium)",def:"Chemicals that modify plant growth without killing the plant. Chlormequat is a growth retardant that shortens cereal stems to prevent lodging (falling over). It is one of the most widely used plant growth regulators in global grain production. Not a pesticide in the traditional sense, but regulated as one."},
  desc:"An emerging contaminant discovered in the US food supply by EWG researchers. Chlormequat shortens wheat, oat, and barley stems to prevent crop lodging. Widely used in European and global grain production, it was detected for the first time in US food and urine samples in EWG's 2024 pilot study (Temkin et al. 2024). Detection rates in US adults increased from 69% in 2017 to 90% in 2023, suggesting increasing exposure possibly linked to rising imports of treated grain or new domestic use approvals.",
  formula:"C₅H₁₃Cl₂N", molWeight:"158.07",
  structure:{atoms:[{el:"Cl",x:.14,y:.42},{el:"CH₂",x:.31,y:.42},{el:"CH₂",x:.48,y:.42},{el:"N⁺",x:.65,y:.42},{el:"CH₃",x:.82,y:.25},{el:"CH₃",x:.82,y:.59}],bonds:[{a:0,b:1,o:1},{a:1,b:2,o:1},{a:2,b:3,o:1},{a:3,b:4,o:1},{a:3,b:5,o:1}],label:"Chloroethyl-trimethylammonium"},
  toxicity:[
    {label:"Reproductive",val:"Reduces fertility and delays puberty in animal studies. Toxic to the reproductive system at doses lower than those causing other toxic effects. EU classifies chlormequat as a reproductive toxicant (Category 2)."},
    {label:"Developmental",val:"Causes reduced fetal weight and skeletal abnormalities in rats. Effects on offspring development at doses relevant to human dietary exposure levels."},
    {label:"Emerging exposure",val:"EWG pilot study: detected in 69% of US adults in 2017, rising to 90% in 2023. Found in oat-based cereals, bread, and other grain products. Detection in US urine samples suggests widespread dietary exposure previously unrecognized."},
    {label:"Ecological",val:"Water-soluble and mobile in soil. Detected in European surface waters. Environmental fate in US waterways not well characterized due to limited monitoring."}
  ],
  gs:{bm:2,label:"Benchmark 2 — Use but search for safer alternatives",detail:"BM-2 based on reproductive toxicity (EU Category 2) and developmental effects. Exposure is increasing rapidly in the US population. The compound is not yet well-characterized for chronic health effects at current dietary exposure levels — a major data gap."},
  parents:["Trimethylamine","Ethylene chlorohydrin"],
  children:[],
  products:["Wheat (growth retardant)","Oats","Barley","Rye","Oat-based cereals and snacks","Bread and baked goods","Imported grain products"],
  func:"Plant growth retardant that inhibits gibberellin biosynthesis, shortening cereal stems to prevent lodging (crop falling over in wind/rain). Increases harvestability and yield stability. Applied during the growing season.",
  manufacturers:[{name:"BASF",note:"Major chlormequat producer (Cycocel brand)."},{name:"Nufarm",note:"Chlormequat formulator."},{name:"Various European and Chinese manufacturers",note:"Widely used in EU grain production. Multiple generic producers."}],

"dietary fungicides": {
  name:"Dietary fungicides", aka:["Thiabendazole","Boscalid","Azoxystrobin","Fludioxonil","Pyrimethanil","Imazalil","Pyraclostrobin","Iprodione"],
  cas:"Multiple (class)",
  chemClass:{name:"Agricultural fungicides",def:"Chemicals applied to crops to prevent or treat fungal infections. They dominate pesticide residues on produce — the EWG/Temkin 2025 study found fungicides are the most commonly detected pesticide type across 44 fruits and vegetables, yet they are among the least studied for human health effects. Major subclasses include strobilurins (azoxystrobin, pyraclostrobin), anilinopyrimidines (pyrimethanil), benzimidazoles (thiabendazole), and imidazoles (imazalil)."},
  desc:"The most frequently detected pesticides on US produce, yet among the least studied for human health effects. The EWG dietary pesticide exposure study found thiabendazole, boscalid, pyraclostrobin, fludioxonil, and azoxystrobin were the most commonly detected pesticides across all 44 commodities. Despite their ubiquity in diet, comprehensive biomonitoring and epidemiological data are limited. Emerging evidence links dietary fungicide mixtures (including imazalil, thiabendazole, chlorpyrifos, malathion) to postmenopausal breast cancer and Type 2 diabetes in the French NutriNet-Santé cohort.",
  formula:"Various", molWeight:"Varies",
  structure:null,
  toxicity:[
    {label:"Endocrine disruption",val:"Imazalil disrupts aromatase and steroidogenesis. Thiabendazole alters thyroid hormone levels. Multiple fungicides show anti-androgenic or estrogenic activity in screening assays. EU has identified several as endocrine disruptors or candidates for evaluation."},
    {label:"Cancer associations",val:"The dietary fungicide mixture of imazalil + thiabendazole + chlorpyrifos + malathion was associated with postmenopausal breast cancer in the NutriNet-Santé cohort. Imazalil is classified as IARC Group 2B (possibly carcinogenic). Iprodione causes liver tumors in animals."},
    {label:"Developmental (emerging)",val:"A Costa Rica birth cohort found prenatal pyrimethanil exposure associated with impaired language development in boys. Azoxystrobin detected in pregnant women and breast milk (Hu et al. 2022). Research is early-stage but concerning given universal dietary exposure."},
    {label:"Data gap",val:"Critical disconnect: fungicides dominate dietary pesticide exposure but are barely represented in NHANES biomonitoring and have limited epidemiological study. The EWG study specifically calls for expanded biomonitoring and health research on widely detected fungicides."}
  ],
  gs:{bm:2,label:"Benchmark 2 — Use but search for safer alternatives (most members)",detail:"Individual fungicides vary. Imazalil is closer to BM-1 due to IARC 2B classification and endocrine disruption. Thiabendazole and azoxystrobin are BM-2. The class warrants more study given the gap between ubiquitous dietary exposure and limited health evidence."},
  parents:["Various synthetic chemistry"],
  children:["Thiabendazole","Boscalid","Azoxystrobin","Fludioxonil","Pyrimethanil","Imazalil","Pyraclostrobin","Iprodione"],
  products:["Citrus fruits (imazalil, thiabendazole — post-harvest)","Berries (fludioxonil, pyraclostrobin)","Grapes/raisins (multiple)","Leafy greens (azoxystrobin, boscalid)","Stone fruits (iprodione)","Apples (pyrimethanil)","Nearly all conventionally grown produce"],
  func:"Prevent and treat fungal infections on crops, both pre- and post-harvest. Strobilurins (azoxystrobin, pyraclostrobin) inhibit mitochondrial respiration. Imidazoles (imazalil) inhibit ergosterol biosynthesis. Post-harvest fungicides like thiabendazole and imazalil are applied to citrus and other fruits after picking to prevent mold during storage and transport.",
  links:[{t:"EWG Temkin et al. 2025",u:"https://doi.org/10.1016/j.ijheh.2025.114654"},{t:"EWG Dirty Dozen",u:"https://www.ewg.org/foodnews/"},{t:"USDA PDP",u:"https://www.ams.usda.gov/datasets/pdp"},{t:"NutriNet-Santé fungicide study",u:"https://doi.org/10.1093/ije/dyab015"}],
  legislation:[{st:"EU",bill:"Reg 1107/2009",status:"passed",title:"Iprodione non-renewed in EU (2018). Imazalil under review for potential non-renewal."},{st:"US",bill:"EPA tolerances",status:"passed",title:"EPA maintains tolerances for all major fungicides — most recently reviewed 2015-2020"},{st:"US",bill:"USDA PDP",status:"passed",title:"USDA monitors fungicide residues annually but they are not included in NHANES biomonitoring — a critical gap"}]
},
"chlorinated paraffins": {
  name:"Chlorinated paraffins (SCCPs & MCCPs)", aka:["SCCPs","MCCPs","Short-chain chlorinated paraffins","Medium-chain chlorinated paraffins","Chlorowax","Cereclor"],
  cas:"85535-84-8 (SCCPs), 85535-85-9 (MCCPs)",
  chemClass:{name:"Chlorinated paraffins",def:"Complex mixtures of chlorinated n-alkanes classified by carbon chain length: short-chain (C10-13, SCCPs), medium-chain (C14-17, MCCPs), and long-chain (C18+, LCCPs). SCCPs are Stockholm Convention POPs (2017). MCCPs were just listed in 2025 — one of the highest-volume industrial chemicals ever added to the Convention. They are regrettable substitutes for SCCPs."},
  desc:"Among the highest-volume industrial chemicals in the world — over 1 million tonnes produced annually. As brominated flame retardants and phthalates face restrictions, industry has increasingly shifted to chlorinated paraffins as replacements, making them a critical 'next battleground' chemical class. SCCPs were listed as Stockholm Convention POPs in 2017. MCCPs were just listed in 2025, making them one of the most recent and consequential additions to the Convention.",
  formula:"CₙH₂ₙ₊₂₋ₓClₓ (variable)", molWeight:"Varies by chain length and chlorination",
  structure:null,
  toxicity:[
    {label:"Cancer",val:"SCCPs are IARC Group 2B (possibly carcinogenic). Cause liver and thyroid tumors in rodents. MCCPs show similar tumor profiles but less data is available."},
    {label:"Endocrine disruption",val:"Disrupt thyroid hormone metabolism. Anti-androgenic activity. Alter reproductive hormone levels in animal studies."},
    {label:"Persistence",val:"Extremely persistent in the environment. Resist biodegradation. Found in Arctic biota, deep ocean sediment, and remote mountain environments far from sources."},
    {label:"Ecological",val:"Highly toxic to aquatic organisms, especially invertebrates. Bioaccumulate through food chains. SCCPs found in marine mammals, birds, and fish worldwide. MCCPs detected in human breast milk and blood."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to persistence, bioaccumulation, aquatic toxicity, and carcinogenicity. Both SCCPs and MCCPs are Stockholm Convention POPs. The massive production volume and use as replacements for other restricted chemicals make this class an urgent priority."},
  parents:["Paraffin wax","Chlorine gas"],
  children:[],
  products:["PVC plasticizer","Metalworking fluids/coolants","Flame retardant in rubber and textiles","Sealants and adhesives","Paints and coatings","Leather treatment","Conveyor belts","Cable insulation"],
  func:"Plasticizers and flame retardant additives in PVC and rubber. Extreme-pressure additives in metalworking fluids. Used wherever flexibility, flame resistance, and water resistance are needed at low cost.",
  manufacturers:[{name:"Dover Chemical",note:"Major US chlorinated paraffins producer (Dover, OH)."},{name:"INEOS Chlor",note:"European producer of chlorinated paraffins."},{name:"Various Chinese manufacturers",note:"China produces >50% of global chlorinated paraffins. Dozens of manufacturers."}],
  triSearch:"https://edap.epa.gov/public/extensions/TRIToxicsTracker/TRIToxicsTracker.html",
  links:[{t:"Stockholm Convention SCCPs",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ECHA SCCPs",u:"https://echa.europa.eu/substance-information/-/substanceinfo/100.084.273"},{t:"EPA SCCPs",u:"https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/short-chain-chlorinated-paraffins-sccps"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"passed",title:"SCCPs listed in Annex A (2017). MCCPs listed in Annex A (2025)."},{st:"EU",bill:"POP Regulation",status:"passed",title:"SCCPs banned in EU. MCCPs restriction imminent following Stockholm listing."},{st:"US",bill:"EPA TSCA",status:"passed",title:"EPA TSCA rule restricting SCCPs in metalworking fluids"},{st:"CA",bill:"Prop 65",status:"passed",title:"SCCPs listed as carcinogen under Prop 65"}],
  waPBT:true
},
"lc-pfcas": {
  name:"Long-chain perfluorocarboxylic acids (LC-PFCAs)", aka:["LC-PFCAs","PFNA","PFDA","PFUnDA","PFDoDA","C9-C21 PFCAs","Long-chain PFAS"],
  cas:"Multiple (C9-C21 perfluorinated acids)",
  chemClass:{name:"Long-chain perfluoroalkyl carboxylic acids",def:"Perfluorinated carboxylic acids with 9 or more carbon atoms (C9-C21). The 'next generation' of PFAS regulation after PFOA (C8). Includes PFNA, PFDA, PFUnDA, and longer chains. Found as impurities in fluoropolymer manufacturing and as degradation products of fluorotelomer-based products. Recommended for Stockholm Convention listing in 2025."},
  desc:"The next frontier of PFAS regulation. While PFOA (C8) has been listed as a Stockholm Convention POP since 2019, the longer-chain PFCAs (C9-C21) were recommended for listing in 2025. These chemicals are found in food contact materials, textiles, and as byproducts of fluoropolymer manufacturing. They are even more bioaccumulative than PFOA — longer chains mean longer half-lives in the human body (years to decades).",
  formula:"CₙF₂ₙ₋₁COOH (n = 9-21)", molWeight:"464-1064",
  structure:null,
  toxicity:[
    {label:"Persistence",val:"Even more persistent than PFOA. No known degradation pathway in the environment. Half-lives in humans increase with chain length — PFNA has a half-life of ~3-4 years; PFUnDA may exceed 8 years."},
    {label:"Bioaccumulation",val:"Bioaccumulation increases with carbon chain length. LC-PFCAs concentrate in blood proteins and liver tissue. Found in Arctic wildlife at higher concentrations than shorter-chain PFAS."},
    {label:"Liver toxicity",val:"Cause hepatomegaly, steatosis, and liver enzyme changes in animal studies. PFNA causes developmental liver effects at very low doses."},
    {label:"Ecological",val:"Global contaminants found in every environmental compartment. Biomagnify through marine food chains. Detected in polar bear liver, seabird eggs, and marine mammals worldwide."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 as part of the PFAS class. Recommended for Stockholm Convention Annex A listing in 2025. More bioaccumulative than PFOA. The regulatory trajectory is clear — elimination."},
  parents:["PFAS (parent class)","Fluorotelomer degradation"],
  children:[],
  products:["Fluoropolymer manufacturing byproducts","Food contact materials","Textile treatments","Ski wax","All-weather clothing","Industrial surfactants"],
  func:"Not intentionally added to most consumer products. Present as impurities from fluoropolymer production and as environmental degradation products of fluorotelomer-based consumer products (stain repellents, food packaging).",
  manufacturers:[{name:"Not directly manufactured",note:"LC-PFCAs are primarily impurities from fluoropolymer manufacturing and degradation products of fluorotelomer-based consumer products."},{name:"Fluoropolymer producers",note:"Chemours, Daikin, 3M (legacy), AGC, Solvay — any fluoropolymer manufacturer generates LC-PFCAs as byproducts."},{name:"Fluorotelomer producers",note:"Chemours, Daikin, AGC — fluorotelomer-based products degrade to LC-PFCAs in the environment."}],
  links:[{t:"Stockholm Convention POPRC",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ECHA LC-PFCAs",u:"https://echa.europa.eu/hot-topics/perfluoroalkyl-chemicals-pfas"},{t:"EPA PFAS",u:"https://www.epa.gov/pfas"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"proposed",title:"Recommended for Annex A listing by POPRC-20 (2024) — COP decision expected 2025"},{st:"EU",bill:"REACH restriction",status:"proposed",title:"Universal PFAS restriction proposal includes all LC-PFCAs"},{st:"US",bill:"EPA MCLs",status:"passed",title:"EPA finalized drinking water limits for PFNA and other LC-PFCAs (2024)"}]
},
"pfhxs": {
  name:"PFHxS", aka:["Perfluorohexane sulfonic acid","Perfluorohexanesulfonate","C6 sulfonate","PFHxS-related compounds"],
  cas:"355-46-4",
  chemClass:{name:"Short-chain perfluoroalkyl sulfonic acids",def:"A 6-carbon perfluorinated sulfonic acid. Marketed as a 'safer' replacement for PFOS (C8 sulfonate) but turned out to be similarly persistent and bioaccumulative. Listed as a Stockholm Convention POP in 2022. The quintessential regrettable substitution story in the PFAS world."},
  desc:"The 'PFOS replacement' that became a POP itself. After 3M phased out PFOS production in 2002, industry shifted to shorter-chain alternatives including PFHxS. But PFHxS proved to be equally persistent, with a human half-life of 5-8 years, and was listed under the Stockholm Convention in 2022 — one of the fastest nominations-to-listing in Convention history. A textbook case of regrettable substitution that argues for class-based PFAS regulation rather than chemical-by-chemical approaches.",
  formula:"C₆HF₁₃O₃S", molWeight:"400.12",
  structure:null,
  toxicity:[
    {label:"Persistence",val:"Half-life in humans: 5-8 years. No known environmental degradation pathway. Global contaminant found in drinking water, wildlife, and human blood worldwide."},
    {label:"Thyroid disruption",val:"Disrupts thyroid hormone levels — associated with increased TSH and altered T4 levels. Thyroid effects observed at background exposure levels in epidemiological studies."},
    {label:"Liver effects",val:"Hepatotoxic. Causes liver enlargement and altered lipid metabolism. Similar mechanism to PFOS."},
    {label:"Ecological",val:"Found in Arctic wildlife, marine mammals, and seabird eggs at concentrations comparable to PFOS. Biomagnifies through aquatic food chains. Contaminates drinking water at military bases where AFFF foam was used."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2022). The fastest example of a regrettable substitution becoming globally regulated. Argues powerfully for class-based PFAS regulation."},
  parents:["PFAS (parent class)","Electrochemical fluorination"],
  children:[],
  products:["AFFF firefighting foam (as PFOS replacement)","Textile and leather treatments","Food contact coatings","Metal plating","Carpet treatments"],
  func:"Surfactant and surface treatment agent used as a replacement for PFOS in firefighting foam and consumer products. Same functional properties as PFOS — water and oil repellency — same PBT profile.",
  manufacturers:[{name:"3M (legacy)",note:"Produced PFHxS as part of electrochemical fluorination process alongside PFOS. Phased out 2002."},{name:"Various AFFF manufacturers",note:"PFHxS present in firefighting foam formulations as PFOS impurity and substitute."}],
  links:[{t:"Stockholm Convention PFHxS",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ATSDR PFAS",u:"https://www.atsdr.cdc.gov/pfas/"},{t:"EPA PFAS action",u:"https://www.epa.gov/pfas"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"passed",title:"PFHxS listed in Annex A (2022) — elimination without specific exemptions"},{st:"US",bill:"EPA MCL",status:"passed",title:"EPA hazard index MCL includes PFHxS (2024)"},{st:"EU",bill:"REACH",status:"proposed",title:"Included in universal PFAS restriction proposal"}]
},
"dechlorane plus": {
  name:"Dechlorane Plus", aka:["DP","Bis(hexachlorocyclopentadieno)cyclooctane","Dechlorane 515","OxyChem DP"],
  cas:"13560-89-9",
  chemClass:{name:"Chlorinated flame retardants (norbornene type)",def:"A highly chlorinated flame retardant developed in the 1960s as a replacement for Mirex — itself banned as a POP in 2004. Dechlorane Plus persists in the environment, bioaccumulates, and was listed under the Stockholm Convention in 2023. A textbook case of regrettable substitution spanning 50+ years."},
  desc:"The replacement for Mirex that became a POP itself — a regrettable substitution story spanning over five decades. Listed under the Stockholm Convention in 2023. Still used in wire and cable insulation, electronics, and automotive applications. Found in human blood, breast milk, and indoor dust. Detected in Arctic air and wildlife, confirming long-range transport.",
  formula:"C₁₈H₁₂Cl₁₂", molWeight:"653.73",
  structure:null,
  toxicity:[
    {label:"Persistence",val:"Extremely persistent in the environment. Resists biodegradation, photolysis, and hydrolysis. Detected in Arctic air, water, and biota — confirming long-range environmental transport."},
    {label:"Bioaccumulation",val:"Bioaccumulates in aquatic and terrestrial food chains. Found in fish, birds, marine mammals, and human blood and breast milk. Biomagnification factor >1 in multiple food webs."},
    {label:"Endocrine disruption",val:"Disrupts thyroid hormone levels in animal studies. Anti-estrogenic activity in vitro. Hepatotoxic at chronic exposure levels."},
    {label:"Ecological",val:"Found in peregrine falcon eggs, herring gull eggs, and beluga whales. Concentrations increasing over time in Arctic biota, indicating ongoing releases despite the Stockholm listing."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2023). The Mirex → Dechlorane Plus story is one of the longest-running regrettable substitution chains in chemical history. Safer non-halogenated alternatives exist."},
  parents:["Hexachlorocyclopentadiene","Cyclooctadiene"],
  children:[],
  products:["Wire and cable insulation","Electronics connectors","Automotive wiring","Roofing materials","Hard plastic enclosures"],
  func:"Flame retardant additive for high-temperature polymer applications, especially wire and cable coatings. Provides flame resistance at lower loading levels than some alternatives.",
  manufacturers:[{name:"OxyChem (Occidental Chemical)",note:"Primary producer of Dechlorane Plus at Niagara Falls, NY plant since 1960s. Only known US manufacturer."}],
  links:[{t:"Stockholm Convention DP",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ECHA",u:"https://echa.europa.eu/substance-information/-/substanceinfo/100.033.575"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"passed",title:"Listed in Annex A with specific exemptions (2023)"},{st:"EU",bill:"POP Regulation",status:"passed",title:"Restricted under EU POP Regulation"},{st:"CA",bill:"CEPA",status:"passed",title:"Canada proposed adding Dechlorane Plus to Schedule 1 (toxic substances)"}]
},
"uv-328": {
  name:"UV-328", aka:["2-(2H-Benzotriazol-2-yl)-4,6-di-tert-pentylphenol","Tinuvin 328","BDTP"],
  cas:"25973-55-1",
  chemClass:{name:"Benzotriazole UV stabilizers",def:"Organic compounds that absorb ultraviolet light to protect plastics, coatings, and rubber from photodegradation. UV-328 is one of many benzotriazole UV stabilizers used in high volumes. It was listed under the Stockholm Convention in 2023 after being found in marine environments worldwide, including in sea turtle blood."},
  desc:"A UV stabilizer added to plastics, rubber, paints, and coatings to prevent degradation from sunlight. A 'hidden' PBT that most people have never heard of — yet it was found in marine environments worldwide, including in the blood of sea turtles in every ocean. Listed under the Stockholm Convention in 2023. Represents a broader category of industrial additives that silently contaminate the global environment.",
  formula:"C₂₂H₂₉N₃O", molWeight:"351.49",
  structure:null,
  toxicity:[
    {label:"Persistence",val:"Extremely persistent in marine sediment and water. Half-life in sediment exceeds 1 year. Detected in deep ocean sediment, remote beaches, and Arctic environments."},
    {label:"Bioaccumulation",val:"High bioconcentration factor in aquatic organisms. Found in sea turtle blood across all oceans. Detected in mussels, fish, and marine mammals."},
    {label:"Reproductive (aquatic)",val:"Causes developmental toxicity in fish at environmentally relevant concentrations. Alters thyroid hormone signaling in aquatic organisms."},
    {label:"Ecological",val:"Global marine contaminant. Enters oceans primarily through plastic debris — as plastics break down, UV-328 leaches into seawater. Also released from antifouling paints and industrial wastewater."}

  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2023). UV-328 illustrates how 'invisible' industrial additives in plastics can become global contaminants. The thousands of similar UV stabilizers, plasticizers, and polymer additives in commerce warrant systematic screening."},
  parents:["2-Aminophenol","Substituted phenols"],
  children:[],
  products:["Automotive coatings and plastics","Marine paints","Plastic packaging","Rubber products","Adhesives","Construction materials","Sports equipment","Furniture"],

  manufacturers:[{name:"BASF",note:"Produces UV-328 (Tinuvin 328 brand) as part of light stabilizer portfolio."},{name:"Songwon",note:"Korean producer of UV stabilizers."},{name:"Clariant",note:"Swiss specialty chemicals. UV stabilizer producer."}],
  links:[{t:"Stockholm Convention UV-328",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ECHA",u:"https://echa.europa.eu/substance-information/-/substanceinfo/100.043.148"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"passed",title:"Listed in Annex A with specific exemptions (2023)"},{st:"EU",bill:"POP Regulation",status:"passed",title:"Restricted under EU POP Regulation"}]

"hbcd": {

    {label:"Neurodevelopmental",val:"Prenatal exposure causes altered behavior, reduced learning and memory in offspring. Effects at environmentally relevant dose levels in animal studies."},
    {label:"Persistence",val:"Extremely persistent in sediment and soil. Bioaccumulates in aquatic food chains. Found in human blood, breast milk, and indoor dust. Indoor levels correlate with proximity to insulated buildings."},

  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2013). Still present in existing building insulation. The contamination of recycled polystyrene with HBCD is a tangible example of how POPs cycle through the circular economy."},

"endosulfan": {
