  desc:"One of the last organochlorine pesticides to be globally restricted. Listed under the Stockholm Convention in 2011 after decades of use on cotton, coffee, tea, and vegetables. Still used in India (the world's largest producer) and some other developing countries under exemptions that are expiring. Causes acute neurotoxicity, endocrine disruption, and reproductive harm. Environmental justice concerns center on farmworker exposure in developing countries.",

  structure:null,

    {label:"Reproductive",val:"Causes reduced sperm quality, altered sex ratios in offspring, and developmental abnormalities in animal studies. Linked to adverse birth outcomes in agricultural communities."},
    {label:"Ecological",val:"Highly toxic to fish and aquatic invertebrates. Bioaccumulates in food chains. Contaminates soil for years after application. Found in Arctic air and biota — confirming long-range transport."}

"methoxychlor": {
  name:"Methoxychlor", aka:["DMDT","Methoxy-DDT","Marlate"],
  cas:"72-43-5",
  chemClass:{name:"Organochlorine insecticides (diphenylethane)",def:"Structurally related to DDT but with methoxy groups replacing the chlorines on the phenyl rings. Marketed as a 'safer' DDT replacement due to more rapid metabolism. Turns out to be a potent endocrine disruptor with transgenerational effects. Listed under Stockholm Convention in 2023."},
  desc:"Marketed as the 'safe DDT replacement' — a claim that aged poorly. While methoxychlor is metabolized faster than DDT, its metabolites are potent endocrine disruptors with effects that persist across generations. Studies by Michael Skinner's lab showed methoxychlor exposure in rats caused reproductive and metabolic disease not just in offspring, but in great-grandchildren (F3 generation) who were never directly exposed — one of the most striking demonstrations of transgenerational epigenetic inheritance from chemical exposure.",
  formula:"C₁₆H₁₅Cl₃O₂", molWeight:"345.65",
  structure:null,
  toxicity:[
    {label:"Transgenerational effects",val:"Exposure causes disease in F1, F2, and F3 generations through epigenetic mechanisms — altered DNA methylation patterns inherited across generations. One of the best-documented examples of transgenerational chemical toxicity."},
    {label:"Endocrine disruption",val:"Metabolites HPTE and mono-OH-methoxychlor are potent estrogen receptor agonists and androgen receptor antagonists. Disrupts both male and female reproductive function."},
    {label:"Reproductive",val:"Causes ovarian atrophy, reduced fertility, early reproductive senescence, and altered pubertal timing. Males show reduced sperm quality and testicular atrophy."},
    {label:"Ecological",val:"Persistent enough for long-range transport despite faster metabolism than DDT. Bioaccumulates in aquatic food chains. Toxic to aquatic invertebrates and fish."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2023). The transgenerational epigenetic effects make methoxychlor one of the most scientifically important toxic chemicals studied. The 'safer DDT' claim is a cautionary tale for all chemical substitution."},
  parents:["DDT (structural analog)","Anisole"],
  children:["HPTE (active estrogenic metabolite)"],
  products:["Insecticide for livestock (historical)","Crop insecticide (historical)","Home and garden insecticide (historical)","No current registered uses in most countries"],
  func:"Broad-spectrum insecticide with contact and stomach action against a wide range of insects. Used on crops, livestock, and in homes as a DDT replacement. EPA canceled all US registrations.",
  links:[{t:"Stockholm Convention methoxychlor",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"Skinner lab transgenerational research",u:"https://pubmed.ncbi.nlm.nih.gov/15585810/"}],
  legislation:[{st:"Global",bill:"Stockholm Convention",status:"passed",title:"Listed in Annex A without specific exemptions (2023)"},{st:"US",bill:"EPA",status:"passed",title:"EPA canceled all methoxychlor registrations (2003)"},{st:"EU",bill:"Reg",status:"passed",title:"Methoxychlor not approved for use in EU"}]

"hexachlorobutadiene": {
  name:"Hexachlorobutadiene (HCBD)", aka:["HCBD","Perchlorobutadiene","C4Cl6"],
  cas:"87-68-3",
  chemClass:{name:"Chlorinated aliphatic hydrocarbons",def:"A fully chlorinated four-carbon diene. Produced as a byproduct of chlorinated solvent manufacturing (PCE, TCE, carbon tetrachloride). Also used intentionally as a solvent and fumigant. Listed under Stockholm Convention in 2015."},
  desc:"A byproduct of manufacturing the chlorinated solvents PCE and TCE — the same chemicals already in your database. This connection matters: the production of TCE and PCE generates HCBD as waste, linking the chlorinated solvent supply chain to yet another POP. Also used as a fumigant and heat transfer fluid. Listed under Stockholm Convention in 2015.",

  toxicity:[
    {label:"Cancer",val:"IARC Group 3 (not classifiable) but causes kidney tumors in rats via a glutathione conjugation pathway. EPA classifies as a possible human carcinogen (Group C)."},
    {label:"Kidney toxicity",val:"Primary target organ is the kidney. Causes renal tubular necrosis and progressive kidney damage. One of the most potent nephrotoxic chlorinated compounds."},

    {label:"Ecological",val:"Toxic to aquatic organisms. Bioaccumulates in fish. Contaminates groundwater near chlorinated solvent manufacturing sites — connecting it to the same contaminated communities affected by TCE and PCE."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 due to kidney toxicity, environmental persistence, and bioaccumulation. Stockholm Convention POP (2015). The connection to TCE/PCE production means communities near chlorinated solvent plants face multiple POP exposures."},

  links:[{t:"Stockholm Convention HCBD",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"ATSDR",u:"https://www.atsdr.cdc.gov/toxprofiles/tp42.pdf"}],

"pentachlorophenol": {
  name:"Pentachlorophenol (PCP)", aka:["PCP","Penta","Pentachlorophenate"],
  cas:"87-86-5",
  chemClass:{name:"Chlorinated phenols",def:"Phenol with five chlorine substituents. Used primarily as a wood preservative. One of the most widely used biocides in the 20th century. Listed under Stockholm Convention in 2015. EPA canceled all US uses effective 2024."},
  desc:"One of the most widely used wood preservatives in history. Applied to utility poles, railroad ties, fence posts, and building lumber for decades. EPA canceled all remaining US uses effective February 2024 after finding unreasonable risk under TSCA. Contaminated with dioxins and furans as manufacturing impurities. Workers who handle PCP-treated wood face both PCP and dioxin exposure.",

  toxicity:[
    {label:"Cancer",val:"IARC Group 1 (carcinogenic to humans, 2019). Causes non-Hodgkin lymphoma. Also contaminated with carcinogenic dioxins and furans as manufacturing impurities."},
    {label:"Acute toxicity",val:"Uncouples oxidative phosphorylation — causes fatal hyperthermia. Occupational deaths documented from dermal exposure. Extremely toxic by all routes."},
    {label:"Dioxin contamination",val:"Technical PCP contains dioxins and furans as impurities. PCP-treated wood is therefore a source of dioxin exposure for workers and communities near treatment facilities."},
    {label:"Ecological",val:"Highly toxic to aquatic organisms. Persists in soil around treated wood structures. Leaches from utility poles and railroad ties into surrounding soil and groundwater for decades."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — IARC Group 1 carcinogen and Stockholm Convention POP (2015). EPA canceled all US uses effective 2024. The dioxin contamination amplifies the hazard far beyond PCP itself."},
  parents:["Phenol","Chlorine"],
  children:["Pentachloroanisole (metabolite)"],
  products:["Utility poles (legacy)","Railroad ties (legacy)","Fence posts","Wharf pilings","Cross-arms","Building lumber (historical)"],
  func:"Wood preservative that protects against fungal decay, insect attack, and marine borers. Applied by pressure treatment. One of the most effective wood preservatives ever used — also one of the most toxic.",
  manufacturers:[{name:"KMG-Bernuth (now KMG Chemicals)",note:"Was the sole remaining US PCP producer until EPA cancellation (2024)."},{name:"Koppers",note:"Wood preservation company. Former PCP user for utility poles."},{name:"Stella-Jones",note:"Major utility pole treater. Transitioning away from PCP."}],

"decabde": {
  name:"DecaBDE (Decabromodiphenyl ether)", aka:["DecaBDE","BDE-209","Decabromodiphenyl oxide","DBDPO","Saytex 102E"],
  cas:"1163-19-5",
  chemClass:{name:"Polybrominated diphenyl ethers (PBDEs)",def:"The last and most heavily used PBDE flame retardant. PentaBDE and OctaBDE were voluntarily phased out in 2004; DecaBDE persisted in commerce until 2017 (Stockholm Convention listing). Still present in electronics, vehicles, and textiles manufactured before the ban, and contaminates recycled plastics."},
  desc:"The last PBDE standing. After PentaBDE and OctaBDE were phased out in 2004, DecaBDE continued in heavy use — primarily in electronics, automotive, and textile applications — until its Stockholm Convention listing in 2017. Still present in billions of products in use worldwide. A major contaminant of recycled plastics, meaning DecaBDE from old electronics ends up in new products including children's toys — a direct circular economy contamination pathway that Toxic-Free Future has researched.",
  formula:"C₁₂Br₁₀O", molWeight:"959.17",
  structure:null,
  toxicity:[
    {label:"Thyroid disruption",val:"Disrupts thyroid hormone metabolism. OH-BDE metabolites bind to thyroid transport proteins. Thyroid effects concerning for neurodevelopment."},
    {label:"Neurodevelopmental",val:"Developmental neurotoxicity in animal studies — altered behavior, impaired learning. Debromination to lower PBDEs (which are more toxic) occurs in the environment and in organisms."},
    {label:"Recycling contamination",val:"Found in recycled plastic products including children's toys, kitchen utensils, and food contact materials. TFF research documented flame retardants in recycled black plastics. This circular economy contamination pathway exposes new populations."},
    {label:"Ecological",val:"Debromination produces lower-brominated PBDEs (PentaBDE, OctaBDE) which are more bioaccumulative and toxic. Global contaminant found in Arctic wildlife. Enters environment from e-waste processing and product use."}
  ],
  gs:{bm:1,label:"Benchmark 1 — Avoid",detail:"BM-1 — Stockholm Convention POP (2017). The circular economy contamination of recycled plastics with DecaBDE is a tangible, current concern. Washington was the first state to ban DecaBDE."},
  parents:["Diphenyl ether","Bromine"],
  children:["Lower PBDEs (debromination products: OctaBDE, PentaBDE)"],
  products:["Electronics enclosures (legacy)","Automotive textiles (legacy)","Upholstery back-coatings (legacy)","Wire & cable insulation","Recycled black plastics (contaminated)","E-waste"],
  func:"Additive flame retardant mixed into polymers (primarily HIPS and textile back-coatings) at 10-15% by weight. Not chemically bound — migrates out of products over time and during recycling.",
  manufacturers:[{name:"Albemarle (formerly Great Lakes Chemical)",note:"Major DecaBDE producer (Saytex 102E brand). Voluntarily phased out."},{name:"ICL Industrial Products",note:"Former DecaBDE producer."},{name:"Chemtura (now Lanxess)",note:"Former DecaBDE producer."}],
  links:[{t:"Stockholm Convention DecaBDE",u:"https://www.pops.int/TheConvention/ThePOPs/TheNewPOPs/tabid/2511/Default.aspx"},{t:"TFF recycled plastics study",u:"https://toxicfreefuture.org/research/toxic-flame-retardants-in-recycled-plastics/"},{t:"EPA DecaBDE",u:"https://www.epa.gov/assessing-and-managing-chemicals-under-tsca/polybrominated-diphenyl-ethers-pbdes"}],

// ─── Molecule renderer ───
function MoleculeCanvas({ structure, width = 280, height = 200 }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!canvasRef.current || !structure) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    canvas.width = width * dpr;
    canvas.height = height * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, width, height);

    const pad = 30;
    const W = width - pad * 2;
    const H = height - pad * 2;
    const tx = (r) => pad + r * W;
    const ty = (r) => pad + r * H;

    const elColors = { C: "#333", O: "#C94040", N: "#2060A8", Cl: "#18805A", F: "#C05A20", H: "#999", Si: "#6A5ABB", S: "#AA7010" };
    const getColor = (el) => elColors[el.replace(/[^A-Za-z]/g, "")] || "#666";

    const { atoms = [], bonds = [], fAtoms, ring, extras, polymer, label: structLabel } = structure;

    // Bonds
    ctx.lineWidth = 2;
    bonds.forEach((b) => {
      const a1 = atoms[b.a], a2 = atoms[b.b];
      if (!a1 || !a2) return;
      const x1 = tx(a1.x), y1 = ty(a1.y), x2 = tx(a2.x), y2 = ty(a2.y);
      ctx.strokeStyle = "rgba(60,60,56,0.3)";
      if (b.o === 2) {
        const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx * dx + dy * dy) || 1;
        const nx = (-dy / len) * 3, ny = (dx / len) * 3;
        ctx.beginPath(); ctx.moveTo(x1 + nx, y1 + ny); ctx.lineTo(x2 + nx, y2 + ny); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(x1 - nx, y1 - ny); ctx.lineTo(x2 - nx, y2 - ny); ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      }
    });

    // F atoms for PFAS-style
    if (fAtoms) {
      fAtoms.forEach((f, i) => {
        const parent = atoms[Math.floor(i / 2)];
        if (!parent) return;
        ctx.strokeStyle = "rgba(60,60,56,0.3)";
        ctx.beginPath(); ctx.moveTo(tx(parent.x), ty(parent.y)); ctx.lineTo(tx(f.x), ty(f.y)); ctx.stroke();
      });
      fAtoms.forEach((f) => {
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(tx(f.x), ty(f.y), 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = getColor(f.el); ctx.font = "500 12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(f.el, tx(f.x), ty(f.y));
      });
    }

    // Extras for ring structures
    if (extras) {
      extras.forEach((e) => {
        const parent = atoms[e.from];
        if (!parent) return;
        ctx.strokeStyle = "rgba(60,60,56,0.3)";
        ctx.beginPath(); ctx.moveTo(tx(parent.x), ty(parent.y)); ctx.lineTo(tx(e.x), ty(e.y)); ctx.stroke();
        ctx.fillStyle = "#FFF"; ctx.beginPath(); ctx.arc(tx(e.x), ty(e.y), e.el.length > 2 ? 22 : 12, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = getColor(e.el); ctx.font = "500 11px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(e.el, tx(e.x), ty(e.y));
      });
    }

    // Polymer brackets
    if (polymer) {
      ctx.strokeStyle = "rgba(60,60,56,0.25)"; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]);
      ctx.strokeRect(tx(0.08), ty(0.06), tx(0.75) - tx(0.08), ty(0.82) - ty(0.06));
      ctx.setLineDash([]);
      ctx.fillStyle = "#888"; ctx.font = "italic 13px system-ui"; ctx.textAlign = "left";
      ctx.fillText("n", tx(0.78), ty(0.80));
    }

    // Main atoms
    atoms.forEach((a) => {
      const r = a.el.length > 2 ? 20 : a.el === "◯" ? 16 : 14;
      ctx.fillStyle = "#FFF";
      ctx.beginPath(); ctx.arc(tx(a.x), ty(a.y), r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = getColor(a.el);
      ctx.font = a.el === "◯" ? "14px system-ui" : "500 13px system-ui";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText(a.el, tx(a.x), ty(a.y));
    });

    // Structure label
    if (structLabel) {
      ctx.fillStyle = "#888"; ctx.font = "11px system-ui"; ctx.textAlign = "center";
      ctx.fillText(structLabel, width / 2, height - 10);
    }
  }, [structure, width, height]);

  if (!structure) return <div style={{ color: COLORS.textMuted, fontSize: 13, textAlign: "center", padding: "2rem" }}>Structure data not available</div>;
  return <canvas ref={canvasRef} width={width} height={height} style={{ width, height, display: "block", margin: "0 auto" }} />;
}

  else if (/justice|disproportionate|chronic/.test(lc)) d = <><rect x={s*.18} y={s*.38} width={s*.26} height={s*.45} fill="none" stroke={color} strokeWidth={swt}/><rect x={s*.56} y={s*.18} width={s*.26} height={s*.65} fill="none" stroke={color} strokeWidth={swt}/></>;

// ─── Legislation section component ───
function LegislationSection({ chem }) {
  const [filter, setFilter] = useState("all");
  const c = chem;
  const rawLeg = c.legislation || [];

  // Normalize — handle both old string[] format and new object[] format
  const bills = rawLeg.map((l, i) => {
    if (typeof l === "string") return { st: "—", bill: "", status: "proposed", title: l, id: i };
    return { ...l, id: i };
  });

  const filtered = filter === "all" ? bills : bills.filter(b => b.status === filter);
  const passedCount = bills.filter(b => b.status === "passed").length;
  const proposedCount = bills.filter(b => b.status === "proposed").length;

  const searchName = c.name.split("(")[0].trim();
  const stBtnStyle = (active) => ({
    fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, padding: "5px 12px",
    borderRadius: 6, border: `1px solid ${active ? COLORS.accent : COLORS.border}`,
    background: active ? COLORS.accentLight : COLORS.surface, color: active ? COLORS.accent : COLORS.textMid,
    cursor: "pointer", transition: "all 0.15s",
  });
  const statusStyle = (s) => s === "passed"
    ? { background: "#EAF3DE", color: "#27500A", border: "1px solid #C0DDA0" }
    : { background: COLORS.warnLight, color: COLORS.warn, border: `1px solid ${COLORS.warnBorder}` };

  return (
    <Section label="Legislation & regulatory action">
      <div style={{ background: COLORS.surfaceAlt, borderRadius: 12, border: `1px solid ${COLORS.border}`, overflow: "hidden" }}>
        {/* Filter tabs */}
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "12px 16px", borderBottom: `1px solid ${COLORS.border}`, flexWrap: "wrap" }}>
          <button onClick={() => setFilter("all")} style={stBtnStyle(filter === "all")}>
            All ({bills.length})
          </button>
          <button onClick={() => setFilter("passed")} style={stBtnStyle(filter === "passed")}>
            Passed ({passedCount})
          </button>
          <button onClick={() => setFilter("proposed")} style={stBtnStyle(filter === "proposed")}>
            Proposed ({proposedCount})
          </button>
        </div>

        {/* Bill list */}
        <div style={{ padding: "4px 0" }}>
          {filtered.length > 0 ? filtered.map((b, i) => (
            <div key={b.id} style={{
              display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 16px",
              borderBottom: i < filtered.length - 1 ? `1px solid ${COLORS.border}` : "none",
            }}>
              {/* State badge */}
              <div style={{
                fontFamily: "'DM Sans', sans-serif", fontSize: 11, fontWeight: 600,
                minWidth: 32, textAlign: "center", padding: "3px 6px", borderRadius: 4,
                background: b.st === "US" ? COLORS.infoLight : b.st === "EU" ? "#EEEDFE" : COLORS.surface,
                color: b.st === "US" ? COLORS.info : b.st === "EU" ? "#534AB7" : COLORS.textMid,
                border: `1px solid ${b.st === "US" ? "#B5D4F4" : b.st === "EU" ? "#CECBF6" : COLORS.border}`,
                flexShrink: 0, marginTop: 1,
              }} title={STATE_NAMES[b.st] || b.st}>
                {b.st}
              </div>

              {/* Bill details */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  {b.bill && (
                    <span style={{ fontFamily: "var(--font-mono, monospace)", fontSize: 12, fontWeight: 500, color: COLORS.text }}>{b.bill}</span>
                  )}
                  <span style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 600,
                    textTransform: "uppercase", letterSpacing: "0.5px", padding: "2px 7px",
                    borderRadius: 4, ...statusStyle(b.status),
                  }}>{b.status}</span>
                </div>
                <div style={{ fontSize: 13, lineHeight: 1.5, color: COLORS.textMid, marginTop: 2 }}>{b.title}</div>
              </div>
            </div>
          )) : (
            <div style={{ padding: "16px", fontSize: 13, color: COLORS.textMuted, textAlign: "center", fontFamily: "'DM Sans', sans-serif" }}>
              No {filter} legislation found for this chemical.
            </div>
          )}
        </div>

        {/* External tracker links */}
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "12px 16px", borderTop: `1px solid ${COLORS.border}`, background: COLORS.surface }}>
          <a href={`https://www.saferstates.org/bill-tracker/?search=${encodeURIComponent(searchName)}`}
            target="_blank" rel="noopener noreferrer"
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, color: COLORS.accent, textDecoration: "none", padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.accentMid}`, background: COLORS.accentLight }}>
            Safer States bill tracker &#8599;
          </a>
          <a href="https://www.saferstates.org/bill-tracker/" target="_blank" rel="noopener noreferrer"
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, color: COLORS.textMid, textDecoration: "none", padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.border}` }}>
            Browse all tracked bills &#8599;
          </a>
          <a href={`https://www.congress.gov/search?q=%7B%22source%22%3A%22legislation%22%2C%22search%22%3A%22${encodeURIComponent(searchName)}%22%7D`}
            target="_blank" rel="noopener noreferrer"
            style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, color: COLORS.textMid, textDecoration: "none", padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.border}` }}>
            Search Congress.gov &#8599;
          </a>
        </div>
      </div>
    </Section>
  );

        c.aka.some(a => a.toLowerCase().includes(query.toLowerCase())) ||
        (c.cas && c.cas.toLowerCase().includes(query.toLowerCase()))
      ).slice(0, 8)
    : [];

  const lookupCurated = useCallback((searchTerm) => {
    const key = ALIASES[searchTerm.toLowerCase()];
    return key ? CURATED_DB[key] : null;
  }, []);

  const loadChemical = useCallback(async (searchTerm) => {
    setShowSuggestions(false);
    setError(null);

    // Check curated DB first
    const curated = lookupCurated(searchTerm);
    if (curated) {
      setActiveChem(curated);
      setAiData(null);
      setLoading(false);
      setQuery(curated.name);
      return;
    }

    // Fall back to API lookup
    setLoading(true);
    setActiveChem(null);
    setAiData(null);
    setQuery(searchTerm);

    try {
      const prompt = `You are a toxicology and environmental health expert. Provide detailed information about the chemical "${searchTerm}" in ONLY valid JSON format. No markdown, no preamble, no backticks. Just the JSON object.

The JSON must have exactly these fields:
{
  "name": "Official chemical name",
  "aka": ["list","of","alternate","names"],
  "cas": "CAS number or 'Multiple (class)' if it's a class",
  "chemClassName": "Name of the chemical class",
  "chemClassDef": "One-paragraph definition of the chemical class",
  "desc": "2-3 sentence description of the chemical, its primary uses, and why it matters",
  "formula": "Molecular formula with subscripts",
  "molWeight": "Molecular weight as string, or 'Varies' for classes",
  "toxicity": [
    {"label": "Category (e.g. Cancer, Endocrine, Respiratory, Ecological)", "val": "2-3 sentence description of the hazard"}
  ],
  "gsBm": 1,
  "gsLabel": "Benchmark 1 — Avoid",
  "gsDetail": "2-3 sentences explaining the GreenScreen benchmark rationale. If you don't know the exact benchmark, estimate based on the chemical's hazard profile and say 'estimated'.",
  "parents": ["List of precursor chemicals"],
  "children": ["List of chemicals derived from this one"],
  "products": ["List of products it's found in"],
  "func": "What function this chemical serves in products",
  "legislation": [{"st": "US or 2-letter state code", "bill": "Bill number or rule name", "status": "passed or proposed", "title": "Short description of what the legislation does"}],
  "links": [{"t": "Link title", "u": "URL"}]
}

Provide 4 toxicity entries covering human health AND ecological hazards. For GreenScreen benchmarks: BM-1 = Avoid (highest concern), BM-2 = Use but search for safer alternatives, BM-3 = Use but still identify safer alternatives, BM-4 = Prefer (safer chemical). If unsure, estimate conservatively. Include at least 2 real links to EPA, ATSDR, IARC, or other authoritative sources. For legislation, include both passed laws and proposed bills. Use 2-letter US state codes (e.g. CA, WA, NY), "US" for federal, "EU" for European Union.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      const data = await response.json();
      const text = (data.content || []).map(c => c.text || "").join("");
      const clean = text.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);

      const formatted = {
        name: parsed.name,
        aka: parsed.aka || [],
        cas: parsed.cas || "Unknown",
        chemClass: { name: parsed.chemClassName || "Unknown", def: parsed.chemClassDef || "" },
        desc: parsed.desc || "",
        formula: parsed.formula || "",
        molWeight: parsed.molWeight || "",
        structure: null,
        toxicity: parsed.toxicity || [],
        gs: { bm: parsed.gsBm || "U", label: parsed.gsLabel || "Unscreened", detail: parsed.gsDetail || "" },
        parents: parsed.parents || [],
        children: parsed.children || [],
        products: parsed.products || [],
        func: parsed.func || "",
        links: parsed.links || [],
        legislation: parsed.legislation || [],
      };

      setAiData(formatted);
      setActiveChem(formatted);
    } catch (err) {
      console.error(err);
      setError(`Could not find information for "${searchTerm}". Try a more specific chemical name.`);
    }
    setLoading(false);
  }, [lookupCurated]);

  const handleSubmit = (e) => {
    e.preventDefault();
    if (query.trim()) loadChemical(query.trim());
  };

  const handleRelatedClick = (name) => {
    loadChemical(name);
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const resetToHome = () => {
    setActiveChem(null);
    setAiData(null);
    setQuery("");
    setError(null);
    window.scrollTo({ top: 0, behavior: "smooth" });
    setTimeout(() => inputRef.current?.focus(), 100);
  };

  const featured = ["PFAS", "PFOA", "Formaldehyde", "6PPD", "BPA", "Glyphosate", "Vinyl chloride", "Phthalates", "DEHP", "Flame retardants", "Lead", "Atrazine", "Chlorpyrifos", "TCE"];

  const c = activeChem;

  return (
    <div style={{ fontFamily: "'Literata', 'Georgia', serif", color: COLORS.text, maxWidth: 780, margin: "0 auto", padding: "0 20px" }}>
      <link href="https://fonts.googleapis.com/css2?family=Literata:opsz,wght@7..72,300;7..72,400;7..72,500;7..72,600;7..72,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ paddingBottom: 20, marginBottom: 28 }}>

            <div style={{ width: 36, height: 36, borderRadius: 10, background: COLORS.accent, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7" cy="7" r="4.5" stroke="#fff" strokeWidth="1.8"/><circle cx="12" cy="10" r="3.5" stroke="#fff" strokeWidth="1.5" opacity=".7"/><line x1="11" y1="4" x2="8" y2="8" stroke="#fff" strokeWidth="1.5" opacity=".5"/></svg>
            </div>
            <div>
              <h1 style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 600, color: COLORS.text, margin: 0, letterSpacing: "-0.3px" }}>

              </h1>
              <p style={{ fontSize: 12, color: COLORS.textMuted, margin: "2px 0 0", fontFamily: "'DM Sans', sans-serif" }}>

          </div>
          {c && (
            <button onClick={resetToHome} style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500, color: COLORS.accent,
              background: COLORS.accentLight, border: `1px solid ${COLORS.accentMid}`, borderRadius: 8,
              padding: "8px 16px", cursor: "pointer", whiteSpace: "nowrap"
            }}>
              ← New search
            </button>
          )}
        </div>

        {/* Search */}
        <form onSubmit={handleSubmit} style={{ position: "relative" }}>
          <div style={{ position: "relative" }}>
            <svg style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", width: 16, height: 16, color: COLORS.textMuted }} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>
            <input
              ref={inputRef}
              type="text"
              value={query}
              onChange={(e) => { setQuery(e.target.value); setShowSuggestions(true); }}

              placeholder="Type a chemical name, CAS number, or class..."
              style={{
                width: "100%", boxSizing: "border-box", padding: "12px 80px 12px 40px",

              }}
              onFocusCapture={(e) => { e.target.style.borderColor = COLORS.accentMid; e.target.style.boxShadow = `0 2px 12px rgba(10,94,71,0.08)`; }}
              onBlurCapture={(e) => { e.target.style.borderColor = COLORS.border; e.target.style.boxShadow = "0 2px 8px rgba(0,0,0,0.04)"; }}
            />
            <button type="submit" style={{
              position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)",
              fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
              background: COLORS.accent, color: "#fff", border: "none", borderRadius: 7,
              padding: "7px 14px", cursor: "pointer",
            }}>

          </div>

          {showSuggestions && filteredSuggestions.length > 0 && (
            <div ref={sugRef} style={{
              position: "absolute", top: "100%", left: 0, right: 0, zIndex: 20,
              background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8,
              marginTop: 4, maxHeight: 260, overflowY: "auto", boxShadow: "0 4px 16px rgba(0,0,0,0.08)"
            }}>
              {filteredSuggestions.map((s, i) => (
                <div key={i} onClick={() => loadChemical(s.name)}
                  style={{ padding: "10px 16px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontSize: 14, borderBottom: i < filteredSuggestions.length - 1 ? `1px solid ${COLORS.surfaceAlt}` : "none" }}

                  onMouseLeave={(e) => e.target.style.background = "transparent"}
                >
                  {s.name}
                  {s.aka[0] && <span style={{ color: COLORS.textMuted, marginLeft: 8, fontSize: 12 }}>{s.aka[0]}</span>}
                </div>

            </div>

        </form>
      </div>

      {/* Loading */}
      {loading && (
        <div style={{ textAlign: "center", padding: "3rem 1rem", fontFamily: "'DM Sans', sans-serif" }}>
          <div style={{ fontSize: 15, color: COLORS.textMid, marginBottom: 8 }}>Researching {query}...</div>
          <div style={{ fontSize: 13, color: COLORS.textMuted }}>Pulling toxicity data, benchmarks, and legislative context</div>
          <div style={{ marginTop: 16, width: 40, height: 3, background: COLORS.accentLight, borderRadius: 2, margin: "16px auto 0", overflow: "hidden", position: "relative" }}>
            <div style={{ position: "absolute", width: "50%", height: "100%", background: COLORS.accent, borderRadius: 2, animation: "slide 1.2s ease-in-out infinite" }} />
          </div>
          <style>{`@keyframes slide { 0% { left: -50%; } 100% { left: 100%; } }`}</style>
        </div>
      )}

      {/* Error */}
      {error && (
        <div style={{ textAlign: "center", padding: "2rem", background: COLORS.dangerLight, borderRadius: 10, border: `1px solid ${COLORS.dangerBorder}`, fontFamily: "'DM Sans', sans-serif" }}>

            border: `1px solid ${COLORS.border}`,

            {/* Decorative molecule dots */}
            <div style={{ position: "absolute", top: 16, right: 20, opacity: 0.06 }}>
              <svg width="120" height="80" viewBox="0 0 120 80"><circle cx="30" cy="20" r="8" fill={COLORS.accent}/><circle cx="70" cy="35" r="12" fill={COLORS.accent}/><circle cx="105" cy="18" r="6" fill={COLORS.accent}/><line x1="30" y1="20" x2="70" y2="35" stroke={COLORS.accent} strokeWidth="2"/><line x1="70" y1="35" x2="105" y2="18" stroke={COLORS.accent} strokeWidth="2"/><circle cx="20" cy="55" r="5" fill={COLORS.danger}/><circle cx="55" cy="65" r="9" fill={COLORS.danger}/><line x1="20" y1="55" x2="55" y2="65" stroke={COLORS.danger} strokeWidth="2"/></svg>
            </div>
            <div style={{ fontSize: 26, fontWeight: 600, fontFamily: "'Literata', serif", color: COLORS.text, marginBottom: 8, lineHeight: 1.2, position: "relative" }}>
              Know what's in your products.
            </div>
            <div style={{ fontSize: 15, color: COLORS.textMid, lineHeight: 1.6, maxWidth: 540, marginBottom: 4, position: "relative" }}>
              Explore toxic chemicals by name — their health hazards, who manufactures them, and which laws are working to restrict them.
            </div>
          </div>

          {/* Quick access */}
          <div style={{ marginBottom: 8 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.textMuted, textTransform: "uppercase", letterSpacing: "0.8px", marginBottom: 10, fontFamily: "'DM Sans', sans-serif" }}>Quick access</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {featured.map((name) => (
                <button key={name} onClick={() => loadChemical(name)}
                  style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
                    padding: "8px 16px", borderRadius: 20, border: `1px solid ${COLORS.border}`,
                    background: COLORS.surface, color: COLORS.text, cursor: "pointer",
                    transition: "all 0.2s", boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
                  }}
                  onMouseEnter={(e) => { e.target.style.background = COLORS.accentLight; e.target.style.borderColor = COLORS.accentMid; e.target.style.color = COLORS.accent; e.target.style.boxShadow = "0 2px 8px rgba(10,94,71,0.1)"; }}
                  onMouseLeave={(e) => { e.target.style.background = COLORS.surface; e.target.style.borderColor = COLORS.border; e.target.style.color = COLORS.text; e.target.style.boxShadow = "0 1px 3px rgba(0,0,0,0.04)"; }}
                >{name}</button>
              ))}
            </div>
          </div>

          {/* Stats bar */}
          <div style={{
            display: "flex", gap: 24, padding: "16px 0", marginTop: 20, borderTop: `1px solid ${COLORS.border}`,
            fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: COLORS.textMuted,
          }}>
            <span><strong style={{ color: COLORS.accent, fontSize: 16 }}>181</strong> chemicals &amp; elements</span>
            <span><strong style={{ color: COLORS.accent, fontSize: 16 }}>61</strong> with manufacturer data</span>
            <span>AI-powered lookup for unlisted chemicals</span>
          </div>
        </div>
      )}

      {/* Chemical detail view */}
      {c && !loading && (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          <style>{`@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }`}</style>

          {/* Header row */}
          <div style={{
            display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 16, marginBottom: 28, flexWrap: "wrap",
            paddingBottom: 24, borderBottom: `2px solid ${COLORS.accent}18`,
          }}>
            <div style={{ flex: 1, minWidth: 200 }}>
              <h2 style={{ fontFamily: "'Literata', serif", fontSize: 26, fontWeight: 600, margin: 0, color: COLORS.text, lineHeight: 1.2 }}>{c.name}</h2>
              {c.aka.length > 0 && <div style={{ fontSize: 13, color: COLORS.textMuted, marginTop: 5, fontFamily: "'DM Sans', sans-serif" }}>Also: {c.aka.join(", ")}</div>}
              <div style={{ fontFamily: "monospace", fontSize: 12, color: COLORS.textMuted, marginTop: 4, background: COLORS.surfaceAlt, display: "inline-block", padding: "2px 8px", borderRadius: 4 }}>CAS: {c.cas}</div>
              {c.spwa && (
                <a href="https://ecology.wa.gov/waste-toxics/reducing-toxic-chemicals/washingtons-toxics-in-products-laws/safer-products" target="_blank" rel="noopener noreferrer" style={{
                  display: "inline-flex", alignItems: "center", gap: 5, marginTop: 6, padding: "3px 10px",
                  borderRadius: 6, background: "#EBF3FA", border: "1px solid #B5D4F4", fontSize: 11, fontWeight: 600,
                  color: "#185FA5", fontFamily: "'DM Sans', sans-serif", textDecoration: "none", letterSpacing: "0.2px",
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#185FA5", opacity: 0.6 }} />
                  WA Safer Products: {c.spwa}
                </a>
              )}
              {c.tfca && (
                <a href="https://ecology.wa.gov/waste-toxics/reducing-toxic-chemicals/washingtons-toxics-in-products-laws/toxic-free-cosmetics-act" target="_blank" rel="noopener noreferrer" style={{
                  display: "inline-flex", alignItems: "center", gap: 5, marginTop: 4, padding: "3px 10px",
                  borderRadius: 6, background: "#EEEDFE", border: "1px solid #CECBF6", fontSize: 11, fontWeight: 600,
                  color: "#534AB7", fontFamily: "'DM Sans', sans-serif", textDecoration: "none", letterSpacing: "0.2px",
                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#534AB7", opacity: 0.6 }} />
                  WA Toxic-Free Cosmetics Act
                </a>

              {c.waPBT && (
                <a href="https://ecology.wa.gov/waste-toxics/reducing-toxic-chemicals/addressing-priority-toxic-chemicals" target="_blank" rel="noopener noreferrer" style={{
                  display: "inline-flex", alignItems: "center", gap: 5, marginTop: 4, padding: "3px 10px",
                  borderRadius: 6, background: "#FCF0F0", border: "1px solid #E8C4C4", fontSize: 11, fontWeight: 600,

                }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#9A2E2E", opacity: 0.6 }} />
                  WA PBT list / Chemical action plan
                </a>
              )}
            </div>
            <GSBadge gs={c.gs} />
          </div>

          {aiData && (
            <div style={{ padding: "8px 14px", borderRadius: 8, background: COLORS.warnLight, border: `1px solid ${COLORS.warnBorder}`, marginBottom: 20, fontSize: 12, color: COLORS.warn, fontFamily: "'DM Sans', sans-serif" }}>
              Data generated by AI — verify critical details with authoritative sources linked below.
            </div>

          {/* Chemical class */}
          {c.chemClass && (
            <Section label="Chemical class">
              <div style={{ display: "inline-block", padding: "3px 12px", borderRadius: 6, background: COLORS.infoLight, color: COLORS.info, fontSize: 12, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", marginBottom: 6 }}>{c.chemClass.name}</div>
              <div style={{ fontSize: 14, lineHeight: 1.7, color: COLORS.textMid }}>{c.chemClass.def}</div>
            </Section>
          )}

          {/* Description */}
          <Section label="What is it">
            <div style={{ fontSize: 15, lineHeight: 1.75, color: COLORS.text }}>{c.desc}</div>
          </Section>

          {/* Two column: structure + toxicity */}
          <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(0,1.3fr)", gap: 28, marginBottom: 8 }}>
            <Section label="Molecular structure">
              <div style={{ background: COLORS.surfaceAlt, borderRadius: 10, padding: "16px 8px 8px", border: `1px solid ${COLORS.border}` }}>
                <MoleculeCanvas structure={c.structure} width={260} height={180} />
                <div style={{ textAlign: "center", fontSize: 12, color: COLORS.textMuted, marginTop: 4, fontFamily: "monospace" }}>
                  {c.formula}{c.molWeight && c.molWeight !== "Varies" && c.molWeight !== "Polymer" ? ` — MW: ${c.molWeight} g/mol` : c.molWeight ? ` — ${c.molWeight}` : ""}
                </div>
              </div>
            </Section>

            <Section label="Health & ecological hazards">
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>

                  const panelColor = i < 3 ? COLORS.danger : COLORS.accent;

          <Section label="Products & function">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
              {(c.products || []).map((p, i) => (
                <span key={i} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, padding: "4px 10px", borderRadius: 6, background: COLORS.surfaceAlt, color: COLORS.textMid }}>{p}</span>
              ))}
            </div>
            <div style={{ fontSize: 14, lineHeight: 1.6, color: COLORS.textMid }}>{c.func}</div>
          </Section>

          {/* Manufacturers section */}
          {c.manufacturers && c.manufacturers.length > 0 && (
            <Section label="Key manufacturers & polluters">
              <div style={{ background: COLORS.surfaceAlt, borderRadius: 10, border: `1px solid ${COLORS.border}`, overflow: "hidden" }}>
                {c.manufacturers.map((m, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px",
                    borderBottom: i < c.manufacturers.length - 1 ? `1px solid ${COLORS.border}` : "none",
                  }}>
                    <div style={{
                      fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 600,
                      color: COLORS.text, minWidth: 140, flexShrink: 0,
                    }}>{m.name}</div>
                    <div style={{ fontSize: 12.5, lineHeight: 1.5, color: COLORS.textMid }}>{m.note}</div>
                  </div>
                ))}
                {c.triSearch && (
                  <div style={{ padding: "10px 14px", borderTop: `1px solid ${COLORS.border}`, background: COLORS.surface }}>
                    <a href={c.triSearch} target="_blank" rel="noopener noreferrer"
                      style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, color: COLORS.accent, textDecoration: "none", padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.accentMid}`, background: COLORS.accentLight }}>
                      EPA TRI Toxics Tracker — search facilities by chemical &#8599;
                    </a>
                    {" "}
                    <a href="https://pedp-ejscreen.azurewebsites.net/" target="_blank" rel="noopener noreferrer"
                      style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500, color: COLORS.textMid, textDecoration: "none", padding: "5px 12px", borderRadius: 6, border: `1px solid ${COLORS.border}` }}>
                      EJScreen mapping tool (preserved) &#8599;
                    </a>
                  </div>
                )}
              </div>
            </Section>
          )}

          {/* Safer alternatives section */}
          {c.saferAlternatives && c.saferAlternatives.length > 0 && (
            <Section label="Safer alternatives">
              <div style={{ background: "#EEF5E6", borderRadius: 10, border: "1px solid #C0DDA0", overflow: "hidden" }}>
                {c.saferAlternatives.map((a, i) => (
                  <div key={i} style={{
                    display: "flex", alignItems: "flex-start", gap: 10, padding: "10px 14px",
                    borderBottom: i < c.saferAlternatives.length - 1 ? "1px solid #C0DDA0" : "none",
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, minWidth: 130, flexShrink: 0 }}>
                      <span style={{ color: "#27500A", fontSize: 13 }}>&#10003;</span>
                      <span style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 600, color: "#27500A" }}>{a.context}</span>
                    </div>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 500, color: COLORS.text, lineHeight: 1.4 }}>{a.alt}</div>
                      <div style={{ fontSize: 11.5, color: COLORS.textMid, lineHeight: 1.4, marginTop: 2 }}>{a.note}</div>
                    </div>
                  </div>
                ))}
                {c.altSource && (
                  <div style={{ padding: "8px 14px", borderTop: "1px solid #C0DDA0", background: "#F5FAF0", fontSize: 11, color: COLORS.textMuted, fontFamily: "'DM Sans', sans-serif" }}>
                    Source: {c.altSource}
                  </div>
                )}
              </div>
            </Section>
          )}

          {/* Legislation section */}
          <LegislationSection chem={c} />


          {/* External links */}
          <Section label="Learn more">
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {(c.links || []).map((l, i) => (
                <a key={i} href={l.u || l.url} target="_blank" rel="noopener noreferrer"
                  style={{
                    fontFamily: "'DM Sans', sans-serif", fontSize: 12, fontWeight: 500,
                    color: COLORS.info, textDecoration: "none", padding: "5px 12px",
                    borderRadius: 6, border: `1px solid ${COLORS.border}`, background: COLORS.surface,
                  }}
                >{l.t || l.label} &#8599;</a>
              ))}
            </div>
          </Section>

          {/* Back to top */}
          <div style={{ textAlign: "center", padding: "16px 0 8px", borderTop: `1px solid ${COLORS.border}` }}>
            <button onClick={resetToHome} style={{
              fontFamily: "'DM Sans', sans-serif", fontSize: 13, fontWeight: 500,
              color: COLORS.accent, background: "none", border: `1px solid ${COLORS.accentMid}`,
              borderRadius: 8, padding: "8px 20px", cursor: "pointer",
            }}>
              &#8592; Search another chemical
            </button>
          </div>
        </div>
      )}

      {/* Footer */}
      <div style={{ marginTop: 32, paddingTop: 16, borderTop: `1px solid ${COLORS.border}`, textAlign: "center", fontSize: 11, color: COLORS.textMuted, fontFamily: "'DM Sans', sans-serif", lineHeight: 1.7 }}>
        Chemical data from curated database and AI-assisted research. Always verify with authoritative sources.<br />
        GreenScreen benchmarks via <a href="https://www.greenscreenchemicals.org/" target="_blank" rel="noopener noreferrer" style={{ color: COLORS.info, textDecoration: "none" }}>Clean Production Action</a>.
        Legislation tracking via <a href="https://www.saferstates.org/bill-tracker/" target="_blank" rel="noopener noreferrer" style={{ color: COLORS.info, textDecoration: "none" }}>Safer States</a>.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ChemicalExplorer />);
  </script>
</body>
</html>
